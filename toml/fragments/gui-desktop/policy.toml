# ============================================================================
# Fragment: gui-desktop
#
# A composable capability bundle: the common Wayland GUI client BINARIES
# (terminals) plus the fontconfig read they render text through. Include it for a confined-GUI app
# kennel; the DISPLAY LEG (the mesh `[[consumes]]` and its env) is the GUI app template's job, not
# this fragment's — this adds the executables (and their resolved `[lib]` closure) and the font read.
#
#   include = ["gui-desktop"]
#
# Additive-only: widens exec.allow with the GUI clients and fs.read with /etc/fonts (the font
# files themselves live under /usr/share, already read by the base; this fs.read bind-mounts
# /etc/fonts into the view). No network, no extra writable path.
# ============================================================================

name = "gui-desktop"

[[exec.allow.add]]
path = "/usr/bin/weston-terminal"
reason = "the reference Wayland terminal emulator (wl_shm, no GPU required)"

[[exec.allow.add]]
path = "/usr/bin/foot"
reason = "a lightweight Wayland terminal emulator"

[[fs.read.add]]
path = "/etc/fonts"

