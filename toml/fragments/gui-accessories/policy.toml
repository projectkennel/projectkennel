# ============================================================================
# Fragment: gui-accessories
#
# A composable capability bundle: the small GNOME desktop utilities — calculator, clocks,
# the character picker, the font viewer. Include it for a confined desktop that wants the
# everyday accessories.
#
#   include = ["gui-accessories"]
#
# Additive-only: exec.allow grants only. UI data lives under /usr/share (the base read floor),
# so no fs grant is needed. These are user-facing utilities with no host/system reach; the
# system tools (disks, system-monitor, settings) are deliberately NOT here — they want host
# access a confined desktop withholds and are inert without it.
# ============================================================================

name = "gui-accessories"

[[exec.allow.add]]
path = "/usr/bin/gnome-calculator"
reason = "GNOME Calculator"

[[exec.allow.add]]
path = "/usr/bin/gnome-clocks"
reason = "GNOME Clocks — world clocks, alarms, timer, stopwatch"

[[exec.allow.add]]
path = "/usr/bin/gnome-characters"
reason = "GNOME Characters — the Unicode and emoji picker"

[[exec.allow.add]]
path = "/usr/bin/gnome-font-viewer"
reason = "GNOME Fonts — font preview and inspection"

[[exec.allow.add]]
path = "/usr/bin/baobab"
reason = "GNOME Disk Usage Analyzer — visualises space within the kennel's own view"

