# ============================================================================
# Fragment: gui-editor
#
# A composable capability bundle: the GNOME text editors. Include it in a confined-GUI
# kennel that should open a graphical text editor.
#
#   include = ["gui-editor"]
#
# Additive-only: widens exec.allow with the editor binaries. Their UI data (icons, themes,
# gsettings schemas) lives under /usr/share, already in the base read floor, so no fs grant
# is needed. Both the current and the classic default are allowed — whichever this Ubuntu
# ships is the one that runs; the absent one is inert.
# ============================================================================

name = "gui-editor"

[[exec.allow.add]]
path = "/usr/bin/gnome-text-editor"
reason = "GNOME Text Editor — the default Ubuntu text editor (22.10+)"

[[exec.allow.add]]
path = "/usr/bin/gedit"
reason = "gedit — the classic GNOME text editor (pre-22.10 default, still widely installed)"

