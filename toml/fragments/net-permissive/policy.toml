# ============================================================================
# Fragment: net-permissive
#
# A composable capability bundle (05-templates.md §5.10): broaden egress to the
# common public package ecosystems and code forges, for a human-driven workflow
# where pinning every destination up front is impractical.
#
#   include = ["net-permissive@v1"]
#
# A NOTE ON SCOPE (and a deliberate divergence from the §5.10 sketch). A fragment
# is additive-only: it can ADD allowed destinations, but it cannot flip the
# structural egress mode (`net.mode`), because that is a scalar override and
# overrides belong in the inheritance chain, not a fragment (§5.10). So this is
# not "open the network" — the per-kennel net namespace, the SOCKS proxy, and the
# invariant denies (cloud-metadata, link-local) all still apply. It is a curated
# allowlist of the destinations a developer-driven build/test/fetch loop usually
# reaches. A workload that genuinely needs unconstrained egress sets
# `net.mode = "unconstrained"` in a template, with a stated reason and threat tag.
#
# Permissive egress is a footgun (footgun-warn-dont-forbid): it widens the
# exfiltration surface (T1.8/T1.9). Each entry carries its threat tag so
# `kennel policy risks` surfaces it.
# ============================================================================

name = "net-permissive"

# --- language package indexes -----------------------------------------------
[[net.proxy.allow.add]]
name = "pypi.org"
ports = [443]
reason = "PyPI package index"
threats.exposed = ["T1.2", "T1.9"]

[[net.proxy.allow.add]]
name = "files.pythonhosted.org"
ports = [443]
reason = "PyPI package downloads"
threats.exposed = ["T1.2", "T1.9"]

[[net.proxy.allow.add]]
name = "registry.npmjs.org"
ports = [443]
reason = "npm registry"
threats.exposed = ["T1.2", "T1.9"]

[[net.proxy.allow.add]]
name = "crates.io"
ports = [443]
reason = "Rust crate index"
threats.exposed = ["T1.2", "T1.9"]

[[net.proxy.allow.add]]
name = "static.crates.io"
ports = [443]
reason = "Rust crate downloads"
threats.exposed = ["T1.2", "T1.9"]

# --- code forges and container registries -----------------------------------
[[net.proxy.allow.add]]
name = "github.com"
ports = [443]
reason = "GitHub (git-over-HTTPS, release downloads)"
threats.exposed = ["T1.8", "T1.9"]

[[net.proxy.allow.add]]
name = "codeload.github.com"
ports = [443]
reason = "GitHub archive/tarball downloads"
threats.exposed = ["T1.9"]

[[net.proxy.allow.add]]
name = "ghcr.io"
ports = [443]
reason = "GitHub Container Registry"
threats.exposed = ["T1.2", "T1.9"]

