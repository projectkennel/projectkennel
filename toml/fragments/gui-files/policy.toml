# ============================================================================
# Fragment: gui-files
#
# A composable capability bundle: the GNOME file manager. Include it for a confined desktop
# that should browse files graphically.
#
#   include = ["gui-files"]
#
# Additive-only: exec.allow grant only; Nautilus's UI data lives under /usr/share (the base
# read floor). Local browsing of the kennel's own view works with the exec grant alone;
# trash, network shares, and removable mounts need the GVfs daemons (more session services),
# which a richer session runtime would add.
# ============================================================================

name = "gui-files"

[[exec.allow.add]]
path = "/usr/bin/nautilus"
reason = "GNOME Files (Nautilus) — the default Ubuntu file manager"

