# ============================================================================
# Reference policy: claude — Claude Code, confined, out of the box.
#
# Vendor-authored leaf on ai-coding-strict: adds the Claude Code binary, its state
# directory, the Anthropic API endpoints, the coding-agent toolset (agent-tools) and
# node (lang-node, for the npm install layout) that the generic template omits, and
# the invocation-cwd grant so `kennel run claude` works from a marked project root.
# Maintainer-signed at source; host-compiled at install (install_reference_policies).
#
# `kennel run claude [-- <args>]` — the pinned [workload] launcher (allowed_args)
# discovers the claude entry point in-view and execs it with any appended args.
#
# Residuals: T1.8 (exfil via the granted LLM API — inherent in the grant); T2.8 on
# the writable project root (carried by the trust manifest; `kennel review` re-pins).
# ============================================================================

name = "claude"
template_base = "ai-coding-strict"
include = ["agent-tools", "lang-node"]

# --- The binary: both install layouts (absent paths normalise away at construction) ---
[[fs.read.add]]
path = [
    "~/.local/bin/claude",                                  # native: launcher
    "~/.local/share/claude",                                # native: versioned payload
    "/usr/lib/node_modules/@anthropic-ai/claude-code",      # npm global (node runs cli.js)
    "/usr/local/lib/node_modules/@anthropic-ai/claude-code",
]
reason = "the Claude Code binary, in whichever install layout is present"

[[exec.allow.add]]
path = ["~/.local/bin/claude", "~/.local/share/claude/**"]
reason = "execute the Claude Code entry point and its versioned payload (glob; survives self-update)"

# The pinned in-view launcher (a facade) must itself be executable in the view.
[[exec.allow.add]]
path = "/usr/libexec/kennel-facades/run-claude.sh"
reason = "the pinned [workload] launcher runs in the view; exec it there"

# --- The project tree: the invocation cwd, writable, marker-gated ---
[fs.cwd]
grant = "write"
required = [".git", ".claude/"]
reason = "the agent edits the project it is invoked from; the writable root is a project the operator marked for agent use (.claude), carrying the T2.8 trust manifest"

# --- State: read-only + ephemeral (Landlock is allow-only — you cannot carve a RO island
# out of a RW parent, so there is no RW-\.claude + RO-config split; it would leave config
# writable). The login token and the config-as-code surface are bound READ-ONLY: the agent
# uses the operator's existing host login (no in-kennel OAuth) and can read hooks/skills/
# commands/subagents but never rewrite them into a later, UNCONFINED session. Everything
# else in ~/.claude is a fresh tmpfs each run — a clean agent per run; re-login on the host
# when the token expires. Nothing under ~/.claude is writable: no injection-persistence
# channel, no cross-project history exposure.
[[fs.read.add]]
path = [
    "~/.claude/.credentials.json",   # OAuth login token (read-only: usable, not rewritable)
    "~/.claude/CLAUDE.md",           # standing instructions
    "~/.claude/settings.json",       # permission rules + hooks
    "~/.claude/commands",            # slash-command templates
    "~/.claude/agents",              # subagent definitions
    "~/.claude/skills",              # instructions + executable scripts
    "~/.claude/plugins",
    "~/.claude.json",           # account + onboarding state (read-only: skip in-kennel OAuth; no mcpServers injection, no history writes)
]
reason = "the operator's login token + the config-as-code surface, bound read-only: usable but not agent-writable (no in-kennel OAuth, no injection into later unconfined sessions)"

# --- Network: the Anthropic endpoints (extend the template's registry set) ---
[[net.proxy.allow]]
name = "api.anthropic.com"
ports = [443]
protocol = "tcp"
reason = "the model API"
threats.exposed = ["T1.8"]

[[net.proxy.allow]]
name = "platform.claude.com"
ports = [443]
protocol = "tcp"
reason = "Claude Code control/telemetry plane (v2.x connects here at startup)"
threats.exposed = ["T1.8"]

[[net.proxy.allow]]
name = "claude.ai"
ports = [443]
protocol = "tcp"
reason = "OAuth login flow (first run / re-auth)"
threats.exposed = ["T1.8"]

[[net.proxy.allow]]
name = "console.anthropic.com"
ports = [443]
protocol = "tcp"
reason = "OAuth login flow (API-key accounts)"
threats.exposed = ["T1.8"]

# Telemetry silenced so the egress audit stays clean rather than recording denied
# connects (statsig feature flags, sentry crash reporting deliberately NOT granted).
[env]
set = { CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1" }

# --- The invocation: pinned in-view launcher, with -- passthrough ---
[workload]
argv = ["/usr/libexec/kennel-facades/run-claude.sh"]
pinned = true
allowed_args = true









