# ============================================================================
# Provider policy: dbus-broker — the standing D-Bus mediation service kennel.
#
# Thin leaf: it derives the maintainer-signed dbus-broker template (which carries the whole
# shape — the host session-bus leg, the exec grant, the `org.projectkennel.dbus` provide) and adds
# only the [workload]: the broker facade to run. The reserved provide's authority is inherited from
# the vendor-signed template, so a host key may compile and sign this at install with no maintainer
# private key on the target.
# ============================================================================

name = "dbus-broker"
template_base = "dbus-broker"

[workload]
argv = ["/usr/libexec/kennel-facades/dbus-broker"]
pinned = true

[signature]
