# ============================================================================
# Provider policy: gui-broker — the confined-GUI display service, ondemand.
#
# Thin leaf over the maintainer-signed gui-broker template (which carries the shape: the host-
# Wayland leg, /dev/dri, the compositor SET, and the reserved [[provides]] org.projectkennel.wayland).
# This leaf adds only the local variance: the [workload] picks ONE compositor — `cage` (kiosk, one
# app full-window). Enabled ondemand: a consumer's first connect socket-activates it (W6).
#
# Host-signed at install: it derives a VENDOR-tier template that confers the reserved-name authority
# , so the settled need not itself be maintainer-signed.
# ============================================================================

name = "gui-broker"
template_base = "gui-broker"

[workload]
argv = [
    "/usr/libexec/kennel-facades/compositor-broker",
    "/run/mesh/gui.sock",
    "/usr/bin/cage",
]
pinned = true

