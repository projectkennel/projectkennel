# ============================================================================
# Reference policy: gui-interactive — a ready-to-run confined graphical terminal.
#
# Thin leaf over gui-interactive@v1 (which carries the shape: [[consumes]] org.projectkennel.wayland,
# the GUI client bundle, fonts, and the inherited interactive@v1 workstation toolset). This leaf adds
# only the [workload]: `weston-terminal`. `kennel run gui-interactive` opens a confined terminal whose
# display server is a broker-spawned nested compositor — no host reach, no GPU grant.
# ============================================================================

name = "gui-interactive"
template_base = "gui-interactive@v1"

[workload]
argv = ["/usr/bin/weston-terminal"]

