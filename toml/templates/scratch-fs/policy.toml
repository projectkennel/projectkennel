# ============================================================================
# Spawn template: scratch-fs
# Inherits: base-confined
# Threat catalogue: THREATS.md v0.4
#
# The WRITE leg of the three-way spawn-target split (compute / write / net):
# a sibling that PERSISTS to a scoped scratch directory and reaches no network
# — `net.mode = "none"` (no egress leg). An agent spawns it to run a command
# that produces files in a chosen scratch area; the write is confined to that
# one directory and the network is off, so persisted data cannot exfil.
#
# Workload-optional cage (§7.12): the template fixes the CAGE (the file-tool
# exec floor + the scratch-write axis + no net) and leaves `workload.argv` open,
# so the caller brings the command that writes. There is no pinned workload.
#
# The fs.read floor is INHERITED from base-confined unchanged; the ONLY added
# capability is the scratch WRITE, selected by the caller from a fixed signed set.
#
# Spawn-eligible (§7.12.8): no `[spawn]` of its own (depth-1), a self-reaping TTL,
# explicit memory/pids/CPU ceilings.
# ============================================================================

template_base = "base-confined"
template_name = "scratch-fs"


# --- Network: frozen off. The write leg reaches no network. ------------------
[net]
mode = "none"


# --- Execution: the file toolset — the shell, the coreutils file/text tools,
#     and Python. No network binary. ------------------------------------------
[exec]
allow = [
    "/bin/sh",
    "/usr/bin/cat", "/usr/bin/cp", "/usr/bin/mv", "/usr/bin/mkdir",
    "/usr/bin/ls", "/usr/bin/tee", "/usr/bin/grep", "/usr/bin/sed",
    "/usr/bin/sort", "/usr/bin/head", "/usr/bin/tail", "/usr/bin/wc",
    "/usr/bin/python3",
]


# --- Lifecycle: a self-reaping TTL (§7.12.7) --------------------------------
[lifecycle]
ttl = "10m"
ttl_action = "exit"


# --- Resource ceilings: mandatory for a spawn target (§7.12.8) --------------
[ulimits]
as = "512M"
nproc = "64"
cpu = "30"


# --- The mutable surface (§7.12.3): the single capability axis is the scratch
#     WRITE — the caller picks its working directory from a fixed, signed set
#     (ONEOF, zero free text). `workload.argv` is open so the caller supplies the
#     command that writes there; the cage (no net) contains what it produces. --
[[mutable]]
field = "fs.write"
oneof = ["~/scratch/work-a", "~/scratch/work-b"]

[[mutable]]
field = "workload.argv"
freeform = true
reason = "the caller runs a command that persists output into the granted scratch dir; no network, write scoped to the chosen scratch"

