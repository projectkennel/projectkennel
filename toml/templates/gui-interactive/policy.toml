# ============================================================================
# Template: gui-interactive  (v1)
# Inherits: interactive
# Threat catalogue: THREATS.md v0.5
#
# The confined graphical-app shape: a workstation app kennel whose display server is NOT the
# host compositor but a per-connection nested compositor brokered by the maintainer-signed
# `gui-broker` GUI-service kennel. It holds NO host reach, NO GPU grant, and cannot name the host
# Wayland socket — it `[[consumes]]` the `org.projectkennel.wayland` capability over the W1 connector
# mesh, and its first connect socket-activates the broker (W6). Permissive otherwise: it inherits the
# interactive workstation toolset (host egress, shells, coreutils, editors, git, python3) and adds
# the GUI client bundle.
#
# A leaf adds only the [workload] — the graphical program to run (e.g. weston-terminal).
#
# Consuming a reserved name is not the gated act (providing it is), so this template needs no
# special tier; it is maintainer-signed as reference content.
# ============================================================================

template_name = "gui-interactive"
template_base = "interactive"

# The GUI client binaries (weston-terminal, foot, …) plus the fontconfig read they render text
# through, on top of the interactive CLI toolset — all from the gui-desktop fragment.
include = ["gui-desktop"]

# The display arrives over the mesh, bound at WAYLAND_DISPLAY — there is no host Wayland leg and no
# /dev/dri here; the app's display server is the gui-broker's nested compositor.
[env.set]
WAYLAND_DISPLAY = "/tmp/wayland-0"
XDG_RUNTIME_DIR = "/tmp"

[[consumes]]
name = "org.projectkennel.wayland"
shape = "af-unix"
at = "/tmp/wayland-0"
required = true
reason = "the confined GUI app reaches its display server — a broker-spawned nested compositor — over the mesh"

