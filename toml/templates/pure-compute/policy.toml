# ============================================================================
# Spawn template: pure-compute  (v1)
# Inherits: base-confined@v1
# Threat catalogue: THREATS.md v0.4
#
# A single-leg SPAWN target (§7.12): an agent holding [spawn] may instantiate
# this to run untrusted code that REACHES NOTHING. `net.mode = "none"` (no egress
# leg) and no workspace write grant (no filesystem leg); the constructed root is
# ephemeral. The one capability it carries is execution of its fixed entrypoint —
# with no net and no persistent fs there is no path to data or exfil.
#
# Spawn-eligible by construction (§7.12.8): it carries no [spawn] of its own
# (depth-1), a self-reaping TTL, and explicit memory/pids/CPU ceilings. It opens
# NO mutable fields — the most fenced target; an agent spawns it exactly as signed,
# so the delegated-spawn residual (T3.9 R1) does not attach.
# ============================================================================

template_base = "base-confined@v1"
template_name = "pure-compute"
template_version = "1"


# --- Network: frozen off. No egress leg. ------------------------------------
[net]
mode = "none"


# --- Execution: the constructed-view compute entrypoint ---------------------
# A kennel-native stdio entrypoint the spawned image provides; everything else is
# denied by base-confined's empty allowlist. The binary is resolved in the
# constructed view at spawn (loaders are per-binary PT_INTERP, filled at spawn).
[exec]
allow = ["/usr/libexec/kennel/mcp-compute", "/bin/sh"]


# --- Workload: the fixed entrypoint; the agent cannot override it ------------
[workload]
argv = ["/usr/libexec/kennel/mcp-compute"]
pinned = true


# --- Lifecycle: a self-reaping TTL (§7.12.7) --------------------------------
[lifecycle]
ttl = "10m"
ttl_action = "exit"


# --- Resource ceilings: mandatory for a spawn target (§7.12.8) --------------
[ulimits]
as = "512M"      # address space (memory)
nproc = "64"     # processes / threads
cpu = "30"       # CPU-seconds

# No [[mutable]] manifest: pure-compute opens nothing — the most fenced target.

[signature]
algorithm = "sshsig"
