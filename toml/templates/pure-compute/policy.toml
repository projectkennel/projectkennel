# ============================================================================
# Spawn template: pure-compute
# Inherits: base-confined
# Threat catalogue: THREATS.md v0.4
#
# The COMPUTE leg of the three-way spawn-target split (compute / write / net):
# a sibling that RUNS CODE and reaches NOTHING beyond it — `net.mode = "none"`
# (no egress leg) and no `fs.write` grant (no persistence leg). An agent spawns
# it to run a text transform or a self-contained computation over stdin→stdout;
# whatever it computes cannot escape the cage.
#
# Workload-optional cage (§7.12): the template fixes the CAGE (the exec floor +
# the no-net/no-write axis) and leaves `workload.argv` open (mutable, freeform),
# so the caller brings the command. There is no pinned workload — a spawn that
# supplies no argv runs nothing. `argv[0]` is gated by `[exec].allow` under
# Landlock execve default-deny regardless of what is written, so the caller
# chooses the command WITHOUT widening what the sibling can reach.
#
# The fs.read floor is INHERITED from base-confined unchanged (the system dirs
# the toolset + libc + CPython stdlib resolve from) — no override, nothing
# clobbered.
#
# Spawn-eligible by construction (§7.12.8): no `[spawn]` of its own (depth-1),
# a self-reaping TTL, explicit memory/pids/CPU ceilings.
# ============================================================================

template_base = "base-confined"
template_name = "pure-compute"


# --- Network: frozen off. The compute leg reaches no network. ----------------
[net]
mode = "none"


# --- Execution: the compute toolset — the shell, the coreutils text tools, and
#     the Python interpreter. No network binary, no writer beyond stdout. The
#     compiler resolves each PT_INTERP (ld.so) and grants EXECUTE. -------------
[exec]
allow = [
    "/bin/sh",
    "/usr/bin/cat", "/usr/bin/grep", "/usr/bin/sed", "/usr/bin/awk",
    "/usr/bin/tr", "/usr/bin/sort", "/usr/bin/uniq", "/usr/bin/cut",
    "/usr/bin/head", "/usr/bin/tail", "/usr/bin/wc",
    "/usr/bin/python3",
]


# --- Lifecycle: a self-reaping TTL (§7.12.7) --------------------------------
[lifecycle]
ttl = "10m"
ttl_action = "exit"


# --- Resource ceilings: mandatory for a spawn target (§7.12.8) --------------
[ulimits]
as = "512M"      # address space (memory)
nproc = "64"     # processes / threads
cpu = "30"       # CPU-seconds


# --- The mutable surface (§7.12.3): the caller's command. FREEFORM — the cage
#     (no net, no fs write), not the argument shape, is the containment. ------
[[mutable]]
field = "workload.argv"
freeform = true
reason = "the caller runs a computation/transform within the [exec].allow floor; the cage (no net, no fs write) contains it"

