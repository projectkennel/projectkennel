# ============================================================================
# Spawn template: net-fetch
# Inherits: base-confined
# Threat catalogue: THREATS.md v0.4
#
# The NET leg of the three-way spawn-target split (compute / write / net):
# a sibling that REACHES the network within a signed destination set and does
# NOT persist — no `fs.write` grant (no persistence leg). Egress is `constrained`
# (frozen — the per-kennel proxy is the gate), so a fetch reaches only an
# allowlisted host and the bytes come back over the spawn channel; nothing the
# sibling pulls can be written to disk.
#
# Workload-optional cage (§7.12): the template fixes the CAGE (the shell + Python
# fetcher exec floor + the constrained-egress axis + no write) and leaves
# `workload.argv` open, so the caller supplies the fetch command. There is no
# pinned workload. Python's `urllib` is the portable fetcher — no `curl`
# dependency; TLS CA certificates come from base-confined's inherited fs.read
# floor (`/etc/ssl`, `/etc/pki`, `/usr/share`).
#
# Spawn-eligible (§7.12.8): no `[spawn]` of its own (depth-1), a self-reaping TTL,
# explicit memory/pids/CPU ceilings.
# ============================================================================

template_base = "base-confined"
template_name = "net-fetch"


# --- Network: constrained egress via the proxy (frozen — the one leg) --------
[net]
mode = "constrained"


# --- Execution: the shell and the Python interpreter (the urllib fetcher).
#     No file-mutation tool — the net leg does not persist. --------------------
[exec]
allow = ["/bin/sh", "/usr/bin/python3"]


# --- Lifecycle: a self-reaping TTL (§7.12.7) --------------------------------
[lifecycle]
ttl = "10m"
ttl_action = "exit"


# --- Resource ceilings: mandatory for a spawn target (§7.12.8) --------------
[ulimits]
as = "512M"
nproc = "64"
cpu = "30"


# --- The mutable surface (§7.12.3): the single capability axis is constrained
#     EGRESS — the caller picks fetch destinations within the signed PATTERN
#     shapes (an open `host:port`, admitted only if it matches a shape; governs
#     the proxy filter only, never `[net.bpf]`). `workload.argv` is open so the
#     caller supplies the fetch command; the cage (no fs write) contains it. ---
[[mutable]]
field = "net.proxy.allow"
match = [
    "pypi.org:443", "*.pypi.org:443", "files.pythonhosted.org:443",
    "registry.npmjs.org:443", "*.npmjs.org:443",
    "crates.io:443", "static.crates.io:443",
    "github.com:443", "*.githubusercontent.com:443", "ghcr.io:443",
]

[[mutable]]
field = "workload.argv"
freeform = true
reason = "the caller runs a fetch against a destination it grants from the signed match set; no fs write, egress confined to the proxy allowlist"

