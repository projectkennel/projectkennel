# ============================================================================
# Template: dbus-broker
# Inherits: base-confined
# Threat catalogue: THREATS.md v0.5
#
# The standing D-Bus mediation service kennel: a desktop-class service that holds the ONE host
# leg per bus (session and system) and mediates them for consumer kennels over the connector
# mesh. A consumer's `[dbus]` section implies the matching consume (`org.projectkennel.dbus` /
# `.dbus-system`); on connect, kenneld resolves the consumer's identity + per-method filter in
# its own namespace and pushes one ACCEPT_SESSION to the broker's control node, which mints a
# filtered session for that consumer. No consumer ever holds a raw bus.
#
# This is the service-kennel multi-leg exemption's worked instance: an operator/maintainer-signed
# service may hold the host session-bus leg, which an ordinary workload may not. A reserved
# `org.projectkennel.*` provide is vendor-tier material, so THIS template carries the maintainer
# signature; a leaf that derives it inherits the authority and need only pick the [workload].
#
# Shape (a leaf adds only the [workload] — the dbus-broker facade argv):
#   * inherit base-confined's read floor unchanged — the facade is statically linked and reached
#     by path under /usr/libexec/** (already in the floor), so it needs no extra read;
#   * exec.allow the broker facade + a shell (base-confined denies all exec);
#   * [[unix.allow]] the host bus legs (session + system), named via DBUS_*_BUS_ADDRESS;
#   * [[provides]] org.projectkennel.dbus / .dbus-system — the mediation capabilities consumers
#     reach over the mesh.
# ============================================================================

template_name = "dbus-broker"
template_base = "base-confined"


# --- Service lifecycle -------------------------------------------------------
[service]
restart = "on-failure"


# --- Network -----------------------------------------------------------------
# A local mediator: no egress. The host bus leg below is an AF_UNIX shim, not network.
[net]
mode = "none"


# --- Execution: the broker facade -------------------------------------------
# base-confined denies all exec; this is the genuine grant. The facade is statically linked and
# reached by absolute path, so the inherited read floor (which covers /usr/libexec/**) suffices.
[exec]
allow = ["/usr/libexec/kennel-facades/dbus-broker", "/bin/sh"]
path = ["/usr/bin", "/bin"]


# --- The host bus legs ---------------------------------------------------------
# The broker proxies consumer traffic to the operator's real buses. Each bus is shimmed in and
# named through its DBUS_*_BUS_ADDRESS; the session `real` carries $XDG_RUNTIME_DIR, resolved
# per-user by kenneld at spawn, so one signed policy serves every user. These are the only raw
# bus legs anywhere — no consumer ever holds one.
[env.set]
DBUS_SESSION_BUS_ADDRESS = "unix:path=/tmp/kennel-broker-bus.sock"
DBUS_SYSTEM_BUS_ADDRESS = "unix:path=/tmp/kennel-broker-system-bus.sock"

[unix]
[[unix.allow]]
name = "session-bus"
real = "$XDG_RUNTIME_DIR/bus"
shim = "/tmp/kennel-broker-bus.sock"
reason = "the broker is the mediator; it holds the single raw connection to the operator's session bus"

[[unix.allow]]
name = "system-bus"
real = "/run/dbus/system_bus_socket"
shim = "/tmp/kennel-broker-system-bus.sock"
reason = "the broker mediates [dbus.system] consumers too; this is the single raw system-bus connection"


# --- Capabilities provided (reserved → vendor-tier; this template is maintainer-signed) ----------
[[provides]]
name = "org.projectkennel.dbus-broker"
shape = "binder-connector"
endpoint = "/dev/binderfs-mesh/binder"
reason = "kenneld pushes per-consumer ACCEPT_SESSION (bus + method filter) to the broker's control node on the mesh"

[[provides]]
name = "org.projectkennel.dbus"
shape = "dbus-name"
endpoint = "org.freedesktop.DBus"
reason = "the mediated session-bus capability consumer kennels reach over the connector mesh"

[[provides]]
name = "org.projectkennel.dbus-system"
shape = "dbus-name"
endpoint = "org.freedesktop.DBus"
reason = "the mediated system-bus capability consumer kennels reach over the connector mesh"

