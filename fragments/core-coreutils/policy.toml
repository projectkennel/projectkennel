# ============================================================================
# Fragment: core-coreutils  (Read / compute / text userland)
#
# A composable capability bundle (05-templates.md §5.10): The non-mutating POSIX userland: read, inspect, filter, and transform. The block every
# interactive and agent template repeats. Carries NO filesystem-mutating tool — compose
# `core-file-mutation` for that — so a read-only kennel includes this alone and cannot write.
#
#   include = ["core-coreutils@v1"]
#
# Additive-only (§5.10): every entry is an `[[exec.allow.add]]` delta. Composing
# this widens the program menu only; `argv[0]` stays gated by the resolved
# `[exec].allow` under Landlock execve default-deny, and the cage (net/fs/ttl/
# ceilings) is untouched.
# ============================================================================

name = "core-coreutils"

