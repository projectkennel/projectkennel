# ============================================================================
# Fragment: vcs-git
#
# A composable capability bundle (05-templates.md §5.10): git plus its
# per-subcommand helpers, and the system git config read-only. Include it for a
# kennel that does source control.
#
#   include = ["vcs-git@v1"]
#
# Additive-only (§5.10). This grants the git *binaries* and the *system* config;
# it deliberately does NOT grant network egress — git-over-HTTPS to a specific
# forge is a destination the leaf states (or `net-permissive` adds), and
# git-over-SSH goes through the per-kennel SSH bastion (`[ssh]`, §7.10), never a
# real key in the kennel.
# ============================================================================

name = "vcs-git"

[[exec.allow.add]]
path = "/usr/bin/git"
reason = "git version-control client"

# git dispatches most subcommands (git-remote-https, git-merge, git-rebase, …) to
# helper binaries under git-core; without this the dispatch is "command not found".
[[exec.allow.add]]
path = "/usr/lib/git-core/**"
reason = "git's per-subcommand helper binaries, re-exec'd by `git`"

# The system git config (alias/safe.directory/credential defaults). Read-only —
# the workload sees it but cannot rewrite the host's git behaviour. The user's
# ~/.gitconfig is NOT bound: the constructed $HOME is synthesised, so per-user git
# identity is set by the leaf (e.g. `[env].set` GIT_AUTHOR_*) if the workflow needs it.
[[fs.read.add]]
path = "/etc/gitconfig"
reason = "system-wide git configuration (read-only)"

