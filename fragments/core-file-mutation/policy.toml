# ============================================================================
# Fragment: core-file-mutation  (Filesystem-mutating userland)
#
# A composable capability bundle (05-templates.md §5.10): The write-side coreutils: create, move, remove, link, change mode. Kept separate from
# `core-coreutils` so a read-only kennel cannot mutate while a scratch/build kennel adds it.
#
#   include = ["core-file-mutation@v1"]
#
# Additive-only (§5.10): every entry is an `[[exec.allow.add]]` delta. Composing
# this widens the program menu only; `argv[0]` stays gated by the resolved
# `[exec].allow` under Landlock execve default-deny, and the cage (net/fs/ttl/
# ceilings) is untouched.
# ============================================================================

name = "core-file-mutation"

[[exec.allow.add]]
path = "/usr/bin/cp"
reason = "copy files"

[[exec.allow.add]]
path = "/usr/bin/mv"
reason = "move/rename files"

[[exec.allow.add]]
path = "/usr/bin/rm"
reason = "remove files"

[[exec.allow.add]]
path = "/usr/bin/mkdir"
reason = "create directories"

[[exec.allow.add]]
path = "/usr/bin/rmdir"
reason = "remove empty directories"

[[exec.allow.add]]
path = "/usr/bin/ln"
reason = "create links"

[[exec.allow.add]]
path = "/usr/bin/touch"
reason = "create/update timestamps"

[[exec.allow.add]]
path = "/usr/bin/chmod"
reason = "change file modes"

[[exec.allow.add]]
path = "/usr/bin/mktemp"
reason = "create a temporary file/dir"

[[exec.allow.add]]
path = "/usr/bin/install"
reason = "copy and set permissions"

[signature]
algorithm = "ed25519"
key_id = "kennel-maint-2026"
signature = "hkAC96VVHe2E0Vicn+nv1vz/mz+kgXD/1SDxDhOyPpLWlx7t/y9cEGSSBSaDt5QysdI5D82io3XYVk61fnywDA=="
