# ============================================================================
# Fragment: lang-node
#
# A composable capability bundle (05-templates.md §5.10): include it to grant a
# kennel what a Node.js workflow needs — the runtime, npm, and the registry.
#
#   include = ["lang-node@v1"]
#
# Additive-only (§5.10): every entry is a `[[*.add]]` delta. A fragment widens;
# it never removes or overrides.
# ============================================================================

name = "lang-node"

# --- the runtime and package manager ----------------------------------------
[[exec.allow.add]]
path = "/usr/bin/node"
reason = "Node.js runtime"

[[exec.allow.add]]
path = "/usr/bin/npm"
reason = "npm package manager"

[[exec.allow.add]]
path = "/usr/bin/npx"
reason = "npm package runner"

# --- the npm cache ----------------------------------------------------------
[[fs.write.add]]
path = "~/.npm/**"
reason = "npm's package cache and logs"

# --- the registry -----------------------------------------------------------
# NB: shared with net-permissive — kept byte-identical there so a leaf may include
# both without a conflict (identical entries dedup; §5.10).
[[net.proxy.allow.add]]
name = "registry.npmjs.org"
ports = [443]
reason = "npm registry"
threats.exposed = ["T1.2", "T1.9"]

[signature]
algorithm = "ed25519"
key_id = "kennel-maint-2026"
signature = "YXxE+iZDy6agMDXoN8W+I8yGE/XA0r2Q9y/arqpjOyZGQRSLILwbUR8q5Eyd96O7/O1fXnoqfGpqWJtnA2rtDQ=="
