# ============================================================================
# Fragment: core-shell  (POSIX shells)
#
# A composable capability bundle (05-templates.md §5.10): The POSIX shells. base-confined denies all execution and sets `[exec].shell` without
# granting it, so every interactive or scripted kennel needs the shell explicitly; this is
# that grant, once, instead of in every template.
#
#   include = ["core-shell@v1"]
#
# Additive-only (§5.10): every entry is an `[[exec.allow.add]]` delta. Composing
# this widens the program menu only; `argv[0]` stays gated by the resolved
# `[exec].allow` under Landlock execve default-deny, and the cage (net/fs/ttl/
# ceilings) is untouched.
# ============================================================================

name = "core-shell"

[[exec.allow.add]]
path = "/bin/sh"
reason = "the POSIX shell, and base-confined's default `[exec].shell`"

[[exec.allow.add]]
path = "/usr/bin/sh"
reason = "the POSIX shell on a merged-usr system"

[[exec.allow.add]]
path = "/bin/bash"
reason = "GNU bash"

[[exec.allow.add]]
path = "/usr/bin/bash"
reason = "GNU bash on a merged-usr system"

[[exec.allow.add]]
path = "/usr/bin/dash"
reason = "the Debian Almquist shell (`/bin/sh` on Debian/Ubuntu)"

# `env` is the near-universal `#!/usr/bin/env <interp>` shebang target, so it belongs in the most
# basic include: a script's interpreter must itself be on exec.allow or the kernel denies its execve.
[[exec.allow.add]]
path = "/usr/bin/env"
reason = "the `#!/usr/bin/env <interp>` shebang interpreter (the kernel's execve target for env-shebang scripts)"

