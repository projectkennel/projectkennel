
# cargo-vet audits file

[[audits.autocfg]]
who = "Remco van Mook <remco.vanmook@gmail.com>"
criteria = "safe-to-deploy"
version = "1.5.1"
notes = "§5.5 (DEPENDENCIES.md, 2026-06-05): byte-identical to github.com/cuviper/autocfg at tag 1.5.1 via tools/audit-source.sh. Build-only — nix's and memoffset's build.rs use it to probe the toolchain for cfg/feature support; nothing ships in any binary. No proc-macro, no dependencies. It probes by compiling tiny snippets via $RUSTC and writing only to OUT_DIR; no network, no fs writes outside OUT_DIR, no arbitrary process exec beyond the compiler probe."

[[audits.basic-toml]]
who = "Remco van Mook <remco.vanmook@gmail.com>"
criteria = "safe-to-deploy"
version = "0.1.10"
notes = "Full source read 2026-06-03 (provenance via tools/audit-source.sh/CHECKSUMS.toml). On our policy-parse path. Zero unsafe, no build.rs, no process/net/fs/env; a pure TOML (de)serializer returning Result. Parser panic-resistance on malformed input is separately fuzzed (fuzz/)."

