[[audits.lexopt]]
who = "Remco van Mook <remco.vanmook@gmail.com>"
criteria = "safe-to-deploy"
version = "0.3.2"
notes = "§5.5 (DEPENDENCIES.md, 2026-06-15): byte-identical to github.com/blyxxyz/lexopt at tag v0.3.2 via tools/audit-source.sh (11 source files). Full source read: a single ~2k-line lib.rs, #![forbid(unsafe_code)], zero dependencies, no build.rs, no proc-macro. The only std::env use is args_os() (its purpose — argument parsing); no FFI/asm/process/net/fs. The kennel-cli argument parser."

[[audits.memoffset]]
who = "Remco van Mook <remco.vanmook@gmail.com>"
criteria = "safe-to-deploy"
version = "0.9.1"
notes = "§5.5 (DEPENDENCIES.md, 2026-06-05): byte-identical to github.com/Gilnaa/memoffset at tag 0.9.1 via tools/audit-source.sh. Pulled by nix's `socket` feature for the CMSG offset macros (scm.rs). Provides the `offset_of!`/`span_of!` macros — pointer-offset arithmetic over `MaybeUninit`; the unsafe is confined to that struct-field-offset computation. No network/fs/process/env. Its build.rs uses autocfg (above) to probe for raw-ref/const-fn support; no proc-macro."

