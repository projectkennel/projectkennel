# Cargo source replacement (CODING-STANDARDS.md §5.5).
#
# Every crate Cargo resolves comes from the in-repo local registry under
# src/vendor/ (the audited .crate tarballs + their index), NOT from
# crates.io. Builds never reach the network for sources: the only thing that
# fetches from crates.io is tools/audit-helper.sh, independently, at audit time.
# This is what makes a post-audit registry compromise unable to change our build
# (the on-disk .crate is authoritative; CHECKSUMS.toml and verify-checksums.sh
# enforce it).
#
# src/vendor/ is a cargo "local registry": the <name>-<version>.crate files
# at its root plus an index/ tree. Entries are added via the §5.5 procedure
# (tools/README.md); the index line for each crate is taken verbatim from
# crates.io's index so metadata and checksum match exactly.

[source.crates-io]
replace-with = "vendored"

[source.vendored]
local-registry = "src/vendor"

# Cross-compilation linkers. Releases ship x86_64 and aarch64 (src/tools/build-release.sh).
# These sections are inert unless that target is actually built, so they are safe on a
# host without the cross toolchain; `aarch64-linux-gnu-gcc` is resolved via PATH (the
# distro `gcc-aarch64-linux-gnu`, or a vendor toolchain). The BPF objects embedded in the
# privhelper are arch-independent cgroup-sockaddr bytecode, so the host clang builds them
# for either target (see kennel-bpf/build.rs and 08-as-built-notes §8.3).
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
