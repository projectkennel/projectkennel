# Project Kennel — CI tool binary manifest (CODING-STANDARDS.md §5.5, §14).
#
# The supply-chain gate (§14) runs `cargo deny`, `cargo audit`, and `cargo vet`.
# Those tools are not crates in our workspace and are not vendored under
# crates-archive/ — and they cannot be `cargo install`ed, because the offline
# `.cargo/config.toml` replaces crates.io with the local registry, so cargo can
# resolve no sources for them. The only remaining honest install path is to
# download the upstream-published prebuilt binary and verify its bytes against a
# checksum WE recorded after the §5.5 cross-verification.
#
# This file is to those binaries what CHECKSUMS.toml is to the vendored .crate
# files: the integrity ground truth. tools/install-ci-tools.sh downloads each
# `url`, checks its SHA-256 against `archive-sha256`, and refuses to proceed on
# any mismatch — or on a still-`PENDING` entry. A post-publish compromise of a
# GitHub release asset therefore cannot change what CI runs: the on-disk hash
# here is authoritative.
#
# §5.5 STATUS — pending second approval.
#   The `archive-sha256` values below are FIRST-FETCH values: downloaded once,
#   and (where upstream publishes a per-asset `.sha256`) confirmed byte-equal to
#   it. That is ONE verification path. §5.5 requires independent cross-source
#   verification and TWO maintainer approvals before an integrity entry is
#   blessed; until a second maintainer signs off (`audited-by`/`audited-on`
#   filled, `notes` cleared), treat these exactly as a freshly-drafted
#   CHECKSUMS.toml entry: present and checkable, but not yet ratified. The CI
#   gate stays non-required until then (see .github/workflows/ci.yml).
#
# Adding or bumping a tool follows the CHECKSUMS.toml procedure (tools/README.md
# §"CI tool binaries"): pin the exact release tag, fetch the asset and its
# upstream `.sha256`, confirm equality, cross-check the release tag/signature,
# record the value, and obtain the second approval.

[tool."cargo-deny"]
version          = "0.19.8"
target           = "x86_64-unknown-linux-musl"
url              = "https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.8/cargo-deny-0.19.8-x86_64-unknown-linux-musl.tar.gz"
archive-sha256   = "70e769ae3872e34d45132b17040859175e11401dc12dddb0303e0b8c7d088f3f"
bin-path         = "cargo-deny-0.19.8-x86_64-unknown-linux-musl/cargo-deny"
audited-by       = "PENDING"
audited-on       = ""
verified-against = [
    "upstream release asset .sha256 (EmbarkStudios/cargo-deny tag 0.19.8) — byte-equal to the computed hash",
]
notes = "first-fetch; statically-linked musl build; needs §5.5 second-approval cross-verification before the gate is made required"

[tool."cargo-audit"]
version          = "0.22.1"
target           = "x86_64-unknown-linux-musl"
url              = "https://github.com/rustsec/rustsec/releases/download/cargo-audit/v0.22.1/cargo-audit-x86_64-unknown-linux-musl-v0.22.1.tgz"
archive-sha256   = "c32506f338bdcdaef5a17fb9f33abb6ecf9561324cfd34237fd335f9283a1eab"
bin-path         = "cargo-audit-x86_64-unknown-linux-musl-v0.22.1/cargo-audit"
audited-by       = "PENDING"
audited-on       = ""
verified-against = [
    "computed from the release asset (rustsec/rustsec tag cargo-audit/v0.22.1)",
]
notes = "first-fetch; SINGLE SOURCE — rustsec publishes no per-asset .sha256, so the second-approval cross-check (independent download + release provenance) is mandatory before this is blessed"

[tool."cargo-vet"]
version          = "0.10.0"
target           = "x86_64-unknown-linux-gnu"
url              = "https://github.com/mozilla/cargo-vet/releases/download/v0.10.0/cargo-vet-x86_64-unknown-linux-gnu.tar.xz"
archive-sha256   = "c7664d9db5dd2ff813f20303650ac8253fa712ff2a1ea9ce12bed71e346f1744"
bin-path         = "cargo-vet-x86_64-unknown-linux-gnu/cargo-vet"
audited-by       = "PENDING"
audited-on       = ""
verified-against = [
    "upstream release asset .sha256 (mozilla/cargo-vet tag v0.10.0) — byte-equal to the computed hash",
]
notes = "first-fetch; needs §5.5 second-approval cross-verification. The cargo-vet audit corpus (supply-chain/) is itself owed — see tools/README.md"
