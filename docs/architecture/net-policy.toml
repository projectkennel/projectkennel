# [net] policy section — complete schema reference
#
# [net] is a pure header: mode, reason, threats.reinstated only.
# Everything else belongs to [net.proxy] (proxy/allowlist layer) or
# [net.bpf] (socket-capability layer).
#
# Four modes, in descending order of isolation:
#
#   none          — CLONE_NEWNET, empty stack, no proxy, no BPF.
#                   No network surface at all. Zero-cost.
#   constrained   — CLONE_NEWNET + loopback alias. Proxy enforces named
#                   destination allowlist. Net-ns is the enforcement primitive;
#                   BPF is optional defence-in-depth.
#   unconstrained — CLONE_NEWNET + loopback alias. Proxy present for audit
#                   and invariant denylist; no name allowlist. BPF shapes
#                   traffic at the socket level.
#   host          — Host net-ns (no CLONE_NEWNET). Proxy mandatory. BPF is
#                   the primary enforcement primitive. Requires reason +
#                   auto-instates threats.reinstated.
#
# Evaluation order for constrained / unconstrained / host:
#   1. [net.bpf] — families / types / protocols / bind / allow / deny
#      enforced at socket() and bind() by cgroup BPF
#   2. [net.proxy] invariant_deny — cloud metadata, link-local (non-removable)
#   3. [[net.proxy.deny]] — optional policy denylist, evaluated before allow
#   4. [[net.proxy.allow]] — constrained only; absent = open in unconstrained/host
#
# mode = none: no [net.proxy], no [net.bpf], no INet binder node.
# mode = host: requires `reason`; compiler auto-sets threats.reinstated.


# ─── mode = none ─────────────────────────────────────────────────────────────

[net]
mode   = "none"
reason = "untrusted post-install script; no network surface required"

# No [net.proxy] or [net.bpf] sections. Compiler rejects them for mode = none.


# ─── mode = constrained ──────────────────────────────────────────────────────

[net]
mode = "constrained"

[net.proxy]
listen_v4         = true
listen_v4_address = "1:1080"   # offset:port within the kennel's /28; absent → "1:1080"
listen_v6         = true
listen_v6_address = "1:1080"   # offset:port within the kennel's /64
accept_private_resolved = false  # true only for kennels that legitimately reach
                                 # internal services by name (rare)

# Named destination allowlist. Proxy resolves names and vets the resolved
# address against net.proxy.deny before connecting. socks5h:// semantics —
# the kennel never resolves DNS itself.
[[net.proxy.allow]]
name     = "api.openai.com"
ports    = [443]
protocol = "tcp"
reason   = "LLM API calls"

[[net.proxy.allow]]
name     = "github.com"
ports    = [22, 443]
protocol = "tcp"
reason   = "source and package fetches"

[[net.proxy.allow]]
name     = "registry.npmjs.org"
ports    = [443]
protocol = "tcp"
reason   = "npm package registry"

# Raw CIDR allow — for internal services reachable only by address.
[[net.proxy.allow]]
cidr     = "10.0.1.0/24"
ports    = [5432]
protocol = "tcp"
reason   = "internal Postgres"

# Optional policy denylist. Evaluated before the allowlist.
# RFC1918 / ULA are NOT invariant denies — a kennel routinely reaches
# internal services. Deny them explicitly here if this kennel should not.
[[net.proxy.deny]]
cidr  = "10.0.0.0/8"
ports = []             # empty = all ports

[[net.proxy.deny]]
cidr  = "172.16.0.0/12"
ports = []

[[net.proxy.deny]]
cidr  = "192.168.0.0/16"
ports = []

# Invariant denylist — non-removable, enforced by the proxy regardless of
# policy. Declared here for documentation and diff-tool visibility only.
[[net.proxy.invariant_deny]]
cidr   = "169.254.169.254/32"   # IPv4 cloud metadata (IMDS)
reason = "SSRF invariant"

[[net.proxy.invariant_deny]]
cidr   = "fd00:ec2::254/128"    # AWS IMDSv6
reason = "SSRF invariant"

[[net.proxy.invariant_deny]]
cidr   = "fe80::/10"            # IPv6 link-local
reason = "SSRF invariant"

# Host services — exact addr:port literals the proxy may reach despite the
# host-loopback invariant deny. Used for the SSH bastion (§7.8.4) and
# similarly privileged host-side services.
[[net.proxy.host_services]]
addr   = "127.0.0.1:7022"
reason = "SSH egress bastion"

# [net.bpf] is optional in constrained mode — defence-in-depth only.
# Net-ns boundary is the enforcement primitive. Omit for the common case.
# Include to further restrict socket capabilities beyond the proxy allowlist.

[net.bpf.families]
allow = ["inet", "inet6"]   # default; explicit here for documentation

[net.bpf.types]
allow = ["stream", "dgram", "seqpacket"]

[net.bpf.protocols]
allow = ["tcp", "udp"]      # default; sctp / dccp / udplite require explicit opt-in


# ─── mode = unconstrained ────────────────────────────────────────────────────

[net]
mode   = "unconstrained"
reason = "build-from-source; open egress required, audit and DoS bounds retained"

[net.proxy]
listen_v4 = true
listen_v6 = true
accept_private_resolved = false

# No [[net.proxy.allow]] — proxy enforces invariant denylist only.
# [[net.proxy.deny]] is still valid to subtract specific address space.

[[net.proxy.deny]]
cidr  = "169.254.0.0/16"   # full link-local block beyond the invariant /32
ports = []

[[net.proxy.invariant_deny]]
cidr   = "169.254.169.254/32"
reason = "SSRF invariant"

[[net.proxy.invariant_deny]]
cidr   = "fd00:ec2::254/128"
reason = "SSRF invariant"

[[net.proxy.invariant_deny]]
cidr   = "fe80::/10"
reason = "SSRF invariant"

# [net.bpf] is meaningful in unconstrained — net-ns is the primary enforcement
# primitive but BPF adds socket-level capability shaping and DoS bounds.

[net.bpf.families]
# Controllable axes: inet, inet6.
# AF_UNIX: governed by [unix], not listed here.
# AF_NETLINK: not a controllable axis. In unconstrained (own net-ns) the kennel
#   stack shows only its own state — nothing to restrict. In host mode it is
#   implicitly available.
# AF_PACKET: requires CAP_NET_RAW. Only meaningful in a root-context kennel;
#   declare explicitly if needed. Compiler warns if CAP_NET_RAW is unavailable.
allow = ["inet", "inet6"]

[net.bpf.types]
# Controllable axes: stream, dgram, seqpacket.
# raw: requires CAP_NET_RAW; declare explicitly for root-context kennels.
allow = ["stream", "dgram", "seqpacket"]

[net.bpf.protocols]
# Default is ["tcp", "udp"]. Anything beyond that requires explicit declaration.
# sctp    — SOCK_SEQPACKET / IPPROTO_SCTP; WebRTC data channels, telecom stacks.
# dccp    — congestion-controlled datagram; RFC 4340.
# udplite — partial-checksum UDP variant; RFC 3828.
# Absence of a protocol here is a deny.
allow = ["tcp", "udp", "sctp"]

[net.bpf.limits]
# DoS bounds. Neither is a security primitive — both are cgroup-level caps.
# max_connections: ceiling on simultaneously open sockets.
# max_connects_per_minute: rate on connect() syscalls.
max_connections         = 256
max_connects_per_minute = 600

# Bind policy. In unconstrained mode, bind() is scoped to the kennel's
# net-ns — not host-visible. Contrast with host mode (see below).
[[net.bpf.bind]]
address  = "0.0.0.0"
ports    = [8080, 8443]
protocol = "tcp"
reason   = "inbound HTTP/HTTPS for the tool server"

[[net.bpf.bind]]
address  = "::"
ports    = [8080, 8443]
protocol = "tcp"
reason   = "inbound HTTP/HTTPS (IPv6)"

# CIDR-level allow/deny at the BPF layer. Enforced at connect() / bind(),
# before the proxy sees the request. No name resolution — CIDR only.
# Use for subnet-level exclusions that do not need the proxy's DNS vetting.
[[net.bpf.allow]]
cidr     = "10.0.0.0/8"
ports    = [443, 8443]
protocol = "tcp"
reason   = "internal services reachable without name resolution"

[[net.bpf.deny]]
cidr   = "100.64.0.0/10"   # CGNAT range
ports  = []
reason = "CGNAT space not needed"


# ─── mode = host ─────────────────────────────────────────────────────────────

[net]
mode   = "host"
reason = "packet capture tooling requires host network stack visibility"
# threats.reinstated is set automatically by the compiler for mode = host.
# It may be extended but not cleared. Declared here for diff-tool visibility.
threats.reinstated = ["T1.6:host-recon"]

[net.proxy]
listen_v4 = true
listen_v6 = true
accept_private_resolved = false
# Proxy is mandatory in host mode — audit is the minimum guarantee.
# [[net.proxy.allow]] is optional; absent = proxy enforces invariant denylist
# only, equivalent to unconstrained at the proxy layer.

[[net.proxy.allow]]
name     = "updates.example.internal"
ports    = [443]
protocol = "tcp"
reason   = "internal update feed"

[[net.proxy.invariant_deny]]
cidr   = "169.254.169.254/32"
reason = "SSRF invariant"

[[net.proxy.invariant_deny]]
cidr   = "fd00:ec2::254/128"
reason = "SSRF invariant"

[[net.proxy.invariant_deny]]
cidr   = "fe80::/10"
reason = "SSRF invariant"

# [net.bpf] is the primary enforcement primitive in host mode.
# The net-ns boundary does not exist; BPF at the cgroup level is what makes
# the proxy unbypassable and constrains socket capabilities.

[net.bpf.families]
# inet and inet6 are the standard axes.
# AF_PACKET declared here for a root-context packet capture kennel.
# Compiler emits: "AF_PACKET requires CAP_NET_RAW; verify privilege context."
allow = ["inet", "inet6", "packet"]

[net.bpf.types]
# raw declared for the same root-context reason.
# Compiler emits: "SOCK_RAW requires CAP_NET_RAW; verify privilege context."
allow = ["stream", "dgram", "raw"]

[net.bpf.protocols]
allow = ["tcp", "udp"]

[net.bpf.limits]
max_connections         = 64
max_connects_per_minute = 120

# Bind rules in host mode are on the host network stack and ARE host-visible.
# The compiler annotates host-mode bind rules with host_visible = true
# automatically and emits: "bind() in host mode exposes a listener on the
# host network stack."
# Restrict to loopback where possible.
[[net.bpf.bind]]
address  = "127.0.0.1"
ports    = [9000]
protocol = "tcp"
reason   = "local control port; loopback only"
# host_visible = true is set by the compiler; declaring it explicitly is
# informational only — it cannot be set to false in host mode.

[[net.bpf.deny]]
cidr   = "10.0.0.0/8"
ports  = []
reason = "internal network not needed from this kennel"