<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'IBM Plex Mono', ui-monospace, monospace">
  <style>
    .paper{fill:#f4f1e6}
    .ink{stroke:#222a63;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .ink-fill{fill:#222a63;stroke:none}
    .faint{stroke:#222a63;opacity:.28;fill:none;stroke-linecap:round}
    .grid{stroke:#222a63;opacity:.05}
    .lbl{fill:#5b6190;font-size:13px;letter-spacing:.12em}
    .lbl-strong{fill:#222a63;font-size:13px;letter-spacing:.12em}
    .word{fill:#222a63;font-family:'Newsreader',Georgia,serif;font-weight:500}
  </style>

  <rect class="paper" x="0" y="0" width="1000" height="560"/>
  <g class="grid">
    <line x1="0" y1="40" x2="1000" y2="40"/><line x1="0" y1="80" x2="1000" y2="80"/><line x1="0" y1="120" x2="1000" y2="120"/><line x1="0" y1="160" x2="1000" y2="160"/><line x1="0" y1="200" x2="1000" y2="200"/><line x1="0" y1="240" x2="1000" y2="240"/><line x1="0" y1="280" x2="1000" y2="280"/><line x1="0" y1="320" x2="1000" y2="320"/><line x1="0" y1="360" x2="1000" y2="360"/><line x1="0" y1="400" x2="1000" y2="400"/><line x1="0" y1="440" x2="1000" y2="440"/><line x1="0" y1="480" x2="1000" y2="480"/><line x1="0" y1="520" x2="1000" y2="520"/>
    <line x1="40" y1="0" x2="40" y2="560"/><line x1="120" y1="0" x2="120" y2="560"/><line x1="200" y1="0" x2="200" y2="560"/><line x1="280" y1="0" x2="280" y2="560"/><line x1="360" y1="0" x2="360" y2="560"/><line x1="440" y1="0" x2="440" y2="560"/><line x1="520" y1="0" x2="520" y2="560"/><line x1="600" y1="0" x2="600" y2="560"/><line x1="680" y1="0" x2="680" y2="560"/><line x1="760" y1="0" x2="760" y2="560"/><line x1="840" y1="0" x2="840" y2="560"/><line x1="920" y1="0" x2="920" y2="560"/>
  </g>

  <text x="40" y="36" class="lbl-strong">PROJECT KENNEL — MARKS</text>

  <!-- ============ 01 SKETCH MARK ============ -->
  <g transform="translate(70,90) scale(1.8)">
    <line class="faint" x1="2" y1="14" x2="2" y2="86"/>
    <path class="faint" d="M-1,17 L2,12 L5,17"/><path class="faint" d="M-1,83 L2,88 L5,83"/>
    <line class="faint" x1="50" y1="6" x2="50" y2="20"/>
    <line class="faint" x1="8" y1="52" x2="92" y2="52"/>
    <!-- roof, double stroke -->
    <polyline class="ink" stroke-width="2.4" points="12,52 50,16 88,52"/>
    <polyline class="ink" stroke-width="1.3" points="17,53 50,21 83,53"/>
    <line class="ink" stroke-width="1" x1="50" y1="16" x2="50" y2="10"/>
    <!-- body -->
    <path class="ink" stroke-width="2.4" d="M24,49 L24,84 L76,84 L76,49"/>
    <!-- padlock door: body + shackle + keyhole -->
    <path class="ink" stroke-width="2.2" d="M38,84 L38,66 Q38,60 44,60 L56,60 Q62,60 62,66 L62,84"/>
    <path class="ink" stroke-width="2" d="M45,60 L45,54 A5,5 0 0 1 55,54 L55,60"/>
    <circle class="ink-fill" cx="50" cy="71" r="3.4"/>
    <path class="ink-fill" d="M50,71 L46.6,79 L53.4,79 Z"/>
    <!-- stray pen dots -->
    <circle class="ink-fill" cx="30" cy="60" r=".7"/><circle class="ink-fill" cx="70" cy="70" r=".7"/><circle class="ink-fill" cx="80" cy="44" r=".6"/>
  </g>
  <text x="70" y="320" class="lbl">01 · sketch mark — hero / large</text>

  <!-- ============ 02 REDUCED MARK ============ -->
  <g transform="translate(390,90) scale(1.8)">
    <polyline class="ink" stroke-width="3" points="14,51 50,18 86,51"/>
    <path class="ink" stroke-width="3" d="M24,49 L24,84 L76,84 L76,49"/>
    <path class="ink" stroke-width="2.6" d="M38,84 L38,66 Q38,60 44,60 L56,60 Q62,60 62,66 L62,84"/>
    <path class="ink" stroke-width="2.4" d="M45,60 L45,54 A5,5 0 0 1 55,54 L55,60"/>
    <circle class="ink-fill" cx="50" cy="71" r="3.4"/>
    <path class="ink-fill" d="M50,71 L46.6,79 L53.4,79 Z"/>
  </g>
  <text x="390" y="320" class="lbl-strong">02 · reduced mark — recommended</text>

  <!-- ============ 03 FAVICON GLYPH @64 ============ -->
  <g transform="translate(740,120) scale(1.2)">
    <polyline class="ink" stroke-width="4" points="14,52 50,20 86,52"/>
    <path class="ink" stroke-width="4" d="M24,50 L24,84 L76,84 L76,50"/>
    <path class="ink" stroke-width="4" d="M40,84 L40,64 Q40,58 46,58 L54,58 Q60,58 60,64 L60,84"/>
    <path class="ink" stroke-width="3.4" d="M45,58 L45,52 A5,5 0 0 1 55,52 L55,58"/>
    <circle class="ink-fill" cx="50" cy="70" r="4"/>
    <path class="ink-fill" d="M50,70 L46,80 L54,80 Z"/>
  </g>
  <text x="740" y="320" class="lbl">03 · glyph / favicon</text>

  <!-- ============ LOCKUP ============ -->
  <g transform="translate(70,380)">
    <g transform="scale(0.95)">
      <polyline class="ink" stroke-width="3" points="14,51 50,18 86,51"/>
      <path class="ink" stroke-width="3" d="M24,49 L24,84 L76,84 L76,49"/>
      <path class="ink" stroke-width="2.6" d="M38,84 L38,66 Q38,60 44,60 L56,60 Q62,60 62,66 L62,84"/>
      <path class="ink" stroke-width="2.4" d="M45,60 L45,54 A5,5 0 0 1 55,54 L55,60"/>
      <circle class="ink-fill" cx="50" cy="71" r="3.4"/>
      <path class="ink-fill" d="M50,71 L46.6,79 L53.4,79 Z"/>
    </g>
    <text x="108" y="68" class="word" font-size="58">kennel</text>
    <line class="faint" x1="110" y1="84" x2="300" y2="84"/>
    <path class="faint" d="M110,81 L105,84 L110,87"/><path class="faint" d="M300,81 L305,84 L300,87"/>
  </g>
  <text x="70" y="500" class="lbl">04 · horizontal lockup (Newsreader)</text>

  <!-- ============ FAVICON SIZES ============ -->
  <g transform="translate(560,395)">
    <text x="0" y="-8" class="lbl">at size</text>
    <g transform="scale(0.56)">
      <polyline class="ink" stroke-width="4" points="14,52 50,20 86,52"/>
      <path class="ink" stroke-width="4" d="M24,50 L24,84 L76,84 L76,50"/>
      <path class="ink" stroke-width="4" d="M40,84 L40,64 Q40,58 46,58 L54,58 Q60,58 60,64 L60,84"/>
      <path class="ink" stroke-width="3.4" d="M45,58 L45,52 A5,5 0 0 1 55,52 L55,58"/>
      <circle class="ink-fill" cx="50" cy="70" r="4"/><path class="ink-fill" d="M50,70 L46,80 L54,80 Z"/>
    </g>
    <g transform="translate(80,18) scale(0.32)">
      <polyline class="ink" stroke-width="5" points="14,52 50,20 86,52"/>
      <path class="ink" stroke-width="5" d="M24,50 L24,84 L76,84 L76,50"/>
      <path class="ink" stroke-width="5" d="M41,84 L41,65 Q41,59 47,59 L53,59 Q59,59 59,65 L59,84"/>
      <circle class="ink-fill" cx="50" cy="71" r="5"/><path class="ink-fill" d="M50,71 L45,81 L55,81 Z"/>
    </g>
    <g transform="translate(132,30) scale(0.20)">
      <polyline class="ink" stroke-width="6" points="14,52 50,20 86,52"/>
      <path class="ink" stroke-width="6" d="M24,50 L24,84 L76,84 L76,50"/>
      <path class="ink" stroke-width="6" d="M42,84 L42,66 Q42,60 50,60 Q58,60 58,66 L58,84"/>
      <circle class="ink-fill" cx="50" cy="72" r="6"/>
    </g>
    <text x="0" y="60" class="lbl">56 · 32 · 20 px</text>
  </g>
</svg>