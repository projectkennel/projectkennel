sonar.projectKey=projectkennel_projectkennel
sonar.organization=projectkennel


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=projectkennel
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Declarative table files: repeated struct-literal entries (CommandSpec/man-page tables) read
# as copy-paste to CPD, but they are data, not logic — duplication detection is noise there.
sonar.cpd.exclusions=src/crates/kennel-lib-cli/src/lib.rs,src/tools/gen-man/src/pages.rs