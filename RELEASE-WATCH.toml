# Project Kennel — upstream release monitoring
#
# Covers the gap left by `cargo audit` and the RustSec feed: legitimate
# upstream bug fixes and maintenance changes that do NOT trigger a CVE or
# advisory but may still matter to Kennel's stability or correctness
# (CODING-STANDARDS.md §5.7).
#
# A weekly CI job polls each upstream feed and opens a single tracking
# issue summarising any direct dependency with an unreviewed release. The
# maintainer on rotation reads the release notes and either acts (follow
# §5.5 to update the checksum manifest) or marks the release seen-and-
# skipped by updating `last-reviewed` here with a one-line note.
#
# Principle: SEEING an upstream release is automated; DECIDING about it is
# not.
#
# STATUS: no direct dependencies yet — the reference runtime is not
# implemented. This file is structured and empty.
#
# Entry format (one per DIRECT dependency):
#
# [[watch]]
# name          = "<crate>"
# repo          = "https://github.com/<org>/<repo>"
# release-feed  = "https://github.com/<org>/<repo>/releases.atom"
# last-reviewed = "vX.Y.Z"
# reviewed-by   = "<maintainer>"
# note          = "optional — e.g. why a release was deliberately skipped"
#
# Maintenance-signal note (§5.7): a change of upstream maintainer is itself
# a supply-chain signal (the xz-utils precedent). Record an ownership change
# here and trigger a fresh `cargo vet` audit at that dependency's next
# release.

[[watch]]
name          = "libc"
repo          = "https://github.com/rust-lang/libc"
release-feed  = "https://github.com/rust-lang/libc/releases.atom"
last-reviewed = "0.2.186"
reviewed-by   = "remco"
note          = "First dependency. Pinned =0.2.186; underlies kennel-syscall FFI."

[[watch]]
name          = "nix"
repo          = "https://github.com/nix-rust/nix"
release-feed  = "https://github.com/nix-rust/nix/releases.atom"
last-reviewed = "0.31.3"
reviewed-by   = "remco"
note          = "Direct dep of kennel-syscall (safe syscall wrappers). Pinned =0.31.3, default-features off. Transitives bitflags/cfg-if/cfg_aliases are not direct deps and are not separately watched (§5.7)."

[[watch]]
name          = "seccompiler"
repo          = "https://github.com/rust-vmm/seccompiler"
release-feed  = "https://github.com/rust-vmm/seccompiler/releases.atom"
last-reviewed = "0.5.0"
reviewed-by   = "remco"
note          = "Direct dep of kennel-syscall (seccomp-BPF filter compiler). Pinned =0.5.0, default features (no json/serde). bitflags is now also a direct dep but already watched implicitly via nix; not separately listed."
