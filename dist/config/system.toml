# Project Kennel — host deployment config (`system.toml`), the installed default.
#
# Integrity-sensitive paths kenneld resolves at startup. The installer seeds this file into
# /etc/kennel (install-if-absent, like any /etc conffile); the admin owns and edits it there.
# kenneld reads /etc/kennel/system.toml, falling back to the compiled defaults for any unset key.
# It is deliberately NOT user-overridable — kenneld never reads ~/.config for these, because the
# daemon runs as the user and letting the user redirect the trust store would defeat policy signing.
#
# (/usr/lib/kennel is the vendor-INVARIANT tier — the org.projectkennel.* namespace authority, NOT a
# config layer; deployment config lives here in /etc.) See the kennel-lib-config crate.

# Directory holding kenneld's helper binaries. Each binary defaults to
# <libexec_dir>/<name>; override an individual one with the keys below.
libexec_dir = "/usr/libexec/kennel"

# The daemon's signing-key trust store: one <key_id>.pub per trusted signer.
trust_dir = "/etc/kennel/keys"

# The host sshd the per-user SSH bastion launches.
sshd = "/usr/sbin/sshd"

# Diagnostic verbosity for the spawn path (stderr → journald). Distinct from the
# per-kennel [audit] security log. "info" (default) is errors/warnings only; "debug"
# traces each orchestration + construction + init-seal step; "trace" adds per-step
# parameters. Set this when debugging a kennel that fails to spawn — it makes the
# YAMA/cgroup/AppArmor/userns/Landlock/seccomp path legible instead of a black box.
#
# The trace spans TWO journals, by where each process lives:
#   - the kenneld daemon  -> the USER journal:  journalctl --user -u kenneld.service
#   - the privhelper factory, the construction child, kennel-bin-init, and the facades
#     (everything inside the kennel) -> the SYSTEM journal:  sudo journalctl -t kenneld
# Read both, merged by time, to see a spawn end to end; reading only the user journal
# makes kennel-bin-init look silent when it is not.
# log_level = "debug"

# Explicit per-binary overrides (absolute paths; no ~ expansion). The key is on the
# left, the default filename under <libexec_dir> on the right. Uncomment to relocate
# a single binary; every helper kenneld resolves at runtime is listed here:
# privhelper    = "/usr/libexec/kennel/kennel-privhelper"   # the suid privilege boundary
# netproxy      = "/usr/libexec/kennel/host-netproxy"       # egress CONNECT delegate
# socks5        = "/usr/libexec/kennel-facades/facade-socks5"       # in-kennel SOCKS5/HTTP front-end
# inetd         = "/usr/libexec/kennel/host-inetd"          # inbound BIND mirror delegate (§7.5.7)
# facade_client = "/usr/libexec/kennel-facades/facade-client"       # in-kennel inbound BIND pull end
# afunix        = "/usr/libexec/kennel-facades/facade-afunix"       # AF_UNIX socket-shim facade (§7.6)
# ssh           = "/usr/libexec/kennel-facades/facade-ssh"          # in-kennel SSH egress connector
# akc           = "/usr/libexec/kennel/kennel-akc"          # sshd AuthorizedKeysCommand helper
# init          = "/usr/libexec/kennel/kennel-bin-init"     # trusted uid-0 PID 1 (root-owned)
