# Kennel confined-GUI broker: weston in nested (windowed) mode.
#
# The gui-broker-weston provider runs `weston --backend=wayland` so weston appears as a *window*
# on the host desktop — and weston's wayland backend draws its OWN titlebar + resize frame, so the
# confined display is a normal movable / resizable / closable host window (GNOME and other hosts do
# not server-side-decorate Wayland clients, so this compositor-drawn frame is what makes it usable).
# Read via `--config` on the provider argv; installed at /etc/kennel/config/weston/weston.ini.

[core]
# The relayed client is Wayland-native (the confined app, or gui-session's own sway). No Xwayland.
xwayland=false
# kiosk-shell, NOT desktop-shell: desktop-shell launches helper clients
# (/usr/libexec/weston-desktop-shell, weston-keyboard) that the exec allowlist denies, so weston
# would quit. kiosk-shell needs no helper processes and shows the one relayed client filling the
# output — exactly the wrapper role. The decorated, resizable host window comes from weston's
# *wayland backend* (its own output frame), not from the shell, so we keep it either way.
shell=kiosk-shell.so

[shell]
background-color=0xff1a1b26
