# kennel-sshd — the per-kennel SSH re-origination bastion's hardened sshd_config
# (docs/design/07-10-ssh.md §7.10.6). This is the SURFACED template: the bastion's
# security posture lives here, legible and admin-tunable, not baked into the daemon.
#
# Resolution is the root-owned cascade — /etc/kennel/kennel-sshd.conf (admin override)
# wins over /usr/lib/kennel/kennel-sshd.conf (this vendor default); there is no user
# layer (the lockdown must not be weakenable by an unprivileged workload). If neither
# file is present, kenneld falls back to the byte-identical copy compiled into the
# daemon. kenneld renders the @PLACEHOLDER@ lines below per bastion into a 0700
# runtime dir and launches stock OpenSSH `sshd` against the result.
#
# The lockdown: a publickey login only, running the per-key forced command with a pty;
# no passwords, no root, no PAM; no TCP/X11/agent/stream-local forwarding, no tunnels,
# PermitOpen none, SFTP wired to /bin/false. SFTP/scp/port-forwarding are out of scope
# by construction. The forced command (`ssh <options> -- <dest> "$SSH_ORIGINAL_COMMAND"`,
# run as the operator) is minted per synthetic key by the root-owned keys helper (AKC) —
# no agent, no key material on this hop (§7.10.1).

# --- Rendered per bastion by kenneld (do not edit the placeholders) ---------------
ListenAddress @LISTEN@
Port @PORT@
HostKey @HOST_KEY@
PidFile @PID_FILE@

# Expose which synthetic key authenticated, to the forced command ($SSH_USER_AUTH).
ExposeAuthInfo yes

# Publickey only.
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin no
PermitEmptyPasswords no
UsePAM no

# Where authorised keys come from — rendered below as either a static owner-only file
# or the root-owned keys helper (AKC) that queries kenneld for the live bindings.
@AUTHORIZED_KEYS@

# --- The session lockdown (admin-tunable, but weakening it widens the bastion) -----
AllowTcpForwarding no
X11Forwarding no
AllowAgentForwarding no
PermitTunnel no
GatewayPorts no
PermitOpen none
AllowStreamLocalForwarding no
Subsystem sftp /bin/false
