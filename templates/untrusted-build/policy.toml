# ============================================================================
# Template: untrusted-build  (v1)
# Inherits: base-confined@v1
# Threat catalogue: THREATS.md v0.3
#
# Building from source you do not trust (a cloned repo's `make`, a downloaded
# tarball's `./configure && make`). The threats are the build script itself
# fetching/exfiltrating (T1.2) and compromising the build (T1.5). The defining move:
# NETWORK OFF. The build gets the toolchain and the source tree, and nothing
# reaches the network — so a malicious build script has no egress for C2 or
# exfiltration, and cannot fetch a second-stage payload.
#
# Because egress is off, legitimate dependencies must come from a pre-populated
# vendor directory / offline mirror in the project tree (the user grants it
# writable). This is the cost of the strong guarantee.
#
# Defends: T1.2 (strong), T1.5 (strong). Residual: needs offline mirrors for real deps.
# ============================================================================

template_base = "base-confined@v1"
template_name = "untrusted-build"
template_version = "1"


# --- Network: OFF -----------------------------------------------------------
# No egress at all — not even via the proxy. This is the template's central
# property; a leaf that needs network should use a different template and accept
# the weaker guarantee. (The base-confined cloud-metadata/RFC1918 invariant denies
# are moot here but remain in force.)
[net]
mode = "none"


# --- Execution: the build toolchain -----------------------------------------
# No package managers that fetch (they could not reach the network anyway); the
# compilers, build drivers, and the shell userland a configure/build needs.
[exec]
allow = [
    "/usr/bin/make", "/usr/bin/cmake", "/usr/bin/ninja",
    "/usr/bin/gcc", "/usr/bin/g++", "/usr/bin/cc", "/usr/bin/c++",
    "/usr/bin/ld", "/usr/bin/as", "/usr/bin/ar", "/usr/bin/ranlib",
    "/usr/bin/pkg-config", "/usr/bin/python3", "/usr/bin/perl",
    "/bin/sh", "/usr/bin/bash", "/usr/bin/dash",
    "/usr/bin/cat", "/usr/bin/ls", "/usr/bin/find", "/usr/bin/grep",
    "/usr/bin/sed", "/usr/bin/awk", "/usr/bin/head", "/usr/bin/tail",
    "/usr/bin/sort", "/usr/bin/uniq", "/usr/bin/wc", "/usr/bin/tr",
    "/usr/bin/mkdir", "/usr/bin/cp", "/usr/bin/mv", "/usr/bin/rm",
    "/usr/bin/ln", "/usr/bin/chmod", "/usr/bin/install", "/usr/bin/env",
    "/usr/bin/tar", "/usr/bin/gzip", "/usr/bin/gunzip", "/usr/bin/xz",
    "/usr/bin/m4", "/usr/bin/bison", "/usr/bin/flex", "/usr/bin/diff",
    "/usr/bin/patch",
]


# --- Lifecycle --------------------------------------------------------------
# A build is bounded; stop at the TTL rather than warn (no interactive session).
[lifecycle]
ttl = "2h"
ttl_action = "stop"

[signature]
algorithm = "ed25519"
key_id = "kennel-maint-2026"
signature = "dh1njrF21/UMASO9qzNJdA0ypOR40Wjyr0M/ME3PXZDMprz2qvR6xe/q3E0f4ipu4tOji5EWQtlHoleoqK6YAQ=="
