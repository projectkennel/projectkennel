# ============================================================================
# Template: base-bwrap  (v1)  — the bubblewrap baseline (unnarrowed bracket).
# Inherits: nothing — this is a reference baseline, NOT a recommended start.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ REFERENCE BASELINE — NOT A RECOMMENDED START.                         │
# │ This template encodes bubblewrap's plain --ro-bind /usr /usr posture: │
# │ the complete host /usr is present (the unnarrowed bracket). Use this  │
# │ only to compare posture against base-confined/base-flatpak, or as a  │
# │ compatibility fallback for workloads that break on the curated        │
# │ base. Prefer base-confined for new work.                             │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Posture:
#   - Whole host /usr read-only + usrmerge compat (/lib, /lib64)
#   - All namespaces, net mode none (isolated)
#   - Permissive exec (the ** wildcard — every readable binary is executable)
#   - No egress proxy, no network access
#   - --dev/--proc/--tmpfs equivalent: constructed /dev, private /tmp, PID ns
#   - Still runs under Kennel's non-optional invariants: Landlock, no_new_privs,
#     setuid/setgid/setcap denial, binder gateway.
#
# See docs/design/04-trust-boundaries.md §4.2.
# ============================================================================

template_name = "base-bwrap"
template_version = "1"


# --- Capabilities (framework invariants) ------------------------------------
[cap]
no_new_privs = true
bounding_set = []


# --- Execution (permissive — the open posture) ------------------------------
[exec]
allow = ["**"]

deny_setuid = true
deny_setgid = true
deny_setcap = true
deny_writable = true

path = ["/usr/bin", "/usr/local/bin", "/usr/sbin", "/bin", "/sbin"]


# --- Filesystem (the unnarrowed /usr) ---------------------------------------
[fs]
# The WHOLE host /usr — the bubblewrap --ro-bind /usr /usr posture.
read = [
    "/usr/**",
    "/lib/**", "/lib64/**",
    "/etc/ssl/**", "/etc/pki/**",
    "/etc/ld.so.conf", "/etc/ld.so.conf.d/**", "/etc/ld.so.cache",
    "/etc/alternatives/**",
    "/proc/self/**", "/proc/cpuinfo", "/proc/meminfo", "/proc/version",
    "/sys/devices/system/cpu/**",
]
write = []

[fs.home]
shadow = true

[fs.tmp]
private = true
size = "512M"
mode = "0700"

[fs.proc]
visibility = "self"
hidepid = true

[fs.dev]
allow = [
    "/dev/null", "/dev/zero", "/dev/random", "/dev/urandom",
    "/dev/tty", "/dev/pts/**",
]


# --- Network (isolated — no egress) ----------------------------------------
[net]
mode = "none"

# Invariant denies — mandatory on every policy, defence-in-depth even in
# mode = none (the runtime enforces these regardless of proxy presence).
[[net.proxy.deny.invariant]]
cidr = "169.254.169.254/32"
reason = "cloud metadata IPv4 — never permitted from a kennel (mandatory invariant)"
[[net.proxy.deny.invariant]]
cidr = "fd00:ec2::254/128"
reason = "AWS IPv6 metadata — never permitted"
[[net.proxy.deny.invariant]]
cidr = "fe80::/10"
reason = "IPv6 link-local — no legitimate egress destination"


# --- AF_UNIX sockets -------------------------------------------------------
[unix]
default = "deny"
abstract = "deny"


# --- Environment ------------------------------------------------------------
[env]
set = { TMPDIR = "/tmp", NO_PROXY = "" }


# --- Seccomp ----------------------------------------------------------------
[seccomp]
profile = "default"
deny = [
    "userfaultfd", "perf_event_open", "bpf",
    "process_vm_readv", "process_vm_writev",
    "kexec_load", "kexec_file_load",
    "mount", "umount", "umount2", "pivot_root",
    "swapon", "swapoff", "reboot",
    "init_module", "finit_module", "delete_module",
    "personality",
]





