# ============================================================================
# Template: ai-coding-strict  (v1)
# Inherits: base-confined@v1
# Threat catalogue: THREATS.md v0.3
#
# Strict confinement for an AI coding agent on a single project tree. Adds, on
# top of base-confined: the interpreters/tools an agent needs, the common package
# registries + git hosts, a per-kennel gpg-agent, and an
# 8-hour TTL. The PROJECT PATH and the LLM API endpoint are deliberately NOT here
# — the user's leaf policy adds them (see README.md / TEMPLATE-ai-coding-strict.md
# at the repo root for the full annotated reference and a sample leaf policy).
#
# Defends: T1.1, T1.2, T1.3, T1.6, T2.1, T2.3, T3.7. Residuals: T1.8 (exfil via the LLM API
# the user grants), T2.2 (semantic regressions in produced code).
#
# Rules below EXTEND base-confined's effective policy: list-valued sections
# (exec.allow, net.allow, unix.allow) are additive; the inherited deny lists and
# invariants are unchanged. See templates/README.md for enforcement status.
# ============================================================================

template_base = "base-confined@v1"
template_name = "ai-coding-strict"
template_version = "1"


# --- Execution: the agent's toolchain (extends base-confined's allowlist) ----
[exec]
allow = [
    # Interpreters
    "/usr/bin/python3", "/usr/bin/node", "/usr/bin/bash", "/bin/sh", "/usr/bin/dash",
    # Build tools
    "/usr/bin/make", "/usr/bin/cmake", "/usr/bin/gcc", "/usr/bin/g++",
    "/usr/bin/cc", "/usr/bin/ld",
    # Package managers
    "/usr/bin/npm", "/usr/bin/npx", "/usr/bin/pip", "/usr/bin/pip3",
    "/usr/bin/yarn", "/usr/bin/pnpm",
    # Source control + SSH (for git-over-SSH via the per-kennel agent)
    "/usr/bin/git", "/usr/lib/git-core/**", "/usr/bin/ssh", "/usr/bin/ssh-add",
    # Standard userland the agent reaches for
    "/usr/bin/cat", "/usr/bin/ls", "/usr/bin/find", "/usr/bin/grep",
    "/usr/bin/sed", "/usr/bin/awk", "/usr/bin/head", "/usr/bin/tail",
    "/usr/bin/sort", "/usr/bin/uniq", "/usr/bin/wc", "/usr/bin/cut",
    "/usr/bin/tr", "/usr/bin/diff", "/usr/bin/patch",
    "/usr/bin/mkdir", "/usr/bin/touch", "/usr/bin/cp", "/usr/bin/mv",
    "/usr/bin/rm", "/usr/bin/ln", "/usr/bin/chmod",
    "/usr/bin/echo", "/usr/bin/printf", "/usr/bin/test", "/usr/bin/env",
    "/usr/bin/which", "/usr/bin/file", "/usr/bin/tar", "/usr/bin/gzip",
    # curl/wget: the net policy still constrains WHERE they may connect.
    "/usr/bin/curl", "/usr/bin/wget",
]


# NOTE: there is no credential "scrubbing" of the project tree. That was a
# `[fs.scrub]` section the runtime never implemented (it would compile-warn and do
# nothing), so it is removed rather than shipped as false assurance. Don't grant a
# tree you don't want the agent to read; secrets in a granted tree are readable.

# --- Network: the common registries + git hosts ------------------------------
# These extend base-confined's allowlist (which is empty). The LLM API is added
# by the user's leaf policy (so the same template serves Claude, Codex, Gemini,
# …). T1.9 (supply-chain compromise in a fetched dependency) is the residual on
# every registry grant.
[[net.proxy.allow]]
name = "registry.npmjs.org"
ports = [443]
protocol = "tcp"
reason = "npm package registry"
threats.exposed = ["T1.9"]
[[net.proxy.allow]]
name = "pypi.org"
ports = [443]
protocol = "tcp"
reason = "Python package index"
threats.exposed = ["T1.9"]
[[net.proxy.allow]]
name = "files.pythonhosted.org"
ports = [443]
protocol = "tcp"
reason = "Python package files (pypi redirect target)"
threats.exposed = ["T1.9"]
[[net.proxy.allow]]
name = "crates.io"
ports = [443]
protocol = "tcp"
reason = "Rust crate registry"
threats.exposed = ["T1.9"]
[[net.proxy.allow]]
name = "static.crates.io"
ports = [443]
protocol = "tcp"
reason = "Rust crate downloads"
threats.exposed = ["T1.9"]
[[net.proxy.allow]]
name = "github.com"
ports = [22, 443]
protocol = "tcp"
reason = "git over SSH and HTTPS"
threats.exposed = ["T1.9"]
[[net.proxy.allow]]
name = "objects.githubusercontent.com"
ports = [443]
protocol = "tcp"
reason = "git LFS / large-file storage"
threats.exposed = ["T1.9"]


# --- AF_UNIX: a per-kennel gpg-agent ----------------------------------------
# SSH is NOT shimmed as an agent socket — an exposed ssh-agent is a
# destination-blind signing oracle (§7.8.1). Per-kennel SSH egress goes through
# the re-origination bastion (the [ssh] section, §7.8), never AF_UNIX.
#
# The shim is for the other agent-shaped services. Here: a per-kennel gpg-agent,
# bound at the path gpg expects. The user's REAL ~/.gnupg keyring is never
# exposed (T1.6). The per-kennel gpg-agent instance is launched separately
# (§7.4.7); until then the shim binds whatever is at `real` (skip-missing).
[[unix.allow]]
name = "gpg-agent"
real = "~/.gnupg/kennels/<kennel>/S.gpg-agent"
shim = "~/.gnupg/S.gpg-agent"
reason = "sign git commits/tags via a per-kennel gpg-agent, not the user's"


# --- Lifecycle --------------------------------------------------------------
# A coding session may run a full workday; warn at the TTL rather than kill.
[lifecycle]
ttl = "8h"
ttl_action = "warn"

[signature]
algorithm = "ed25519"
key_id = "kennel-maint-2026"
signature = "Wz0Vl/W4uUJcUS3FhTjJsxJDIss3iGuRc12UENYG/Nz19u7yi6I7ewX+Hdy5a7cCzKZlbOMWH6+8yEJizu4+BQ=="
