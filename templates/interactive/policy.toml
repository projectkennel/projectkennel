# ============================================================================
# Template: interactive  (v1)  — a credible human-driven shell.
#
# A confined but genuinely usable workstation shell: bash + the standard coreutils,
# text tools, editors, archives, process inspection, and the common network tools,
# with HOST egress (a human is at the keyboard; direct egress on the host stack, the
# cloud-metadata invariant still applies). Execution is deny-by-default — the toolset below is exactly what runs;
# the compiler resolves each tool's library closure (`[lib]`, inherited).
#
# $HOME and /tmp are writable (ephemeral); grant a project dir + persistence in your
# own leaf. For an offline shell, derive base-confined instead (or set net.mode).
#
#   # run it directly:
#   kennel run interactive -- /bin/bash
#   # or derive it and add your project:
#   #   template_base = "interactive@v1"
#   #   [[fs.write.add]] path = "~/work"
# ============================================================================

template_name = "interactive"
template_version = "1"
template_base = "base-confined@v1"

# Exec floor composed from the fragment catalogue (05-templates.md §5.10):
# the shells + POSIX userland + capability bundles, instead of hand-listing them.
include = ["core-shell@v1", "core-coreutils@v1", "core-file-mutation@v1", "core-archive@v1", "net-clients@v1", "vcs-git@v1"]


# Host egress: a human-driven shell needs unmediated network (curl, git clone, ssh, …)
# on the host stack — no SOCKS proxy. This shares the host network namespace and so
# reinstates the host-recon residual (T1.6), which is why `host` requires a reason; the
# cloud-metadata invariant deny + the net.bpf allowlist are still enforced via BPF/Landlock.
[net]
mode = "host"
reason = "an interactive human shell needs direct, unmediated egress (git/ssh/curl) on the host network stack"

# Re-list base-confined's read baseline (a template's fs.read replaces, not adds) and
# widen /proc to the whole namespaced procfs so `ps`/`top`/`free` see this kennel's
# own processes (the PID namespace already hides everything else).
[fs]
read = [
    "/usr/**", "/lib/**", "/lib64/**",
    "/etc/ssl/**", "/etc/pki/**",
    "/etc/ld.so.conf", "/etc/ld.so.conf.d/**", "/etc/ld.so.cache",
    "/etc/alternatives/**",   # awk→gawk, vi, editor, pager … symlink farm (else dangles)
    "/proc/**",
    "/sys/devices/system/cpu/**",
]

[exec]
shell = "/bin/bash"
# Only the binaries no fragment provides stay inline here; the shell, the POSIX
# userland, and the toolchains come from the `include` above.
allow = [
    "/usr/bin/clear",
    "/usr/bin/df",
    "/usr/bin/du",
    "/usr/bin/free",
    "/usr/bin/hexdump",
    "/usr/bin/ip",
    "/usr/bin/kill",
    "/usr/bin/nano",
    "/usr/bin/netstat",
    "/usr/bin/od",
    "/usr/bin/pgrep",
    "/usr/bin/pidof",
    "/usr/bin/pkill",
    "/usr/bin/ps",
    "/usr/bin/python3",
    "/usr/bin/scp",
    "/usr/bin/ss",
    "/usr/bin/ssh",
    "/usr/bin/strings",
    "/usr/bin/sync",
    "/usr/bin/timeout",
    "/usr/bin/top",
    "/usr/bin/uptime",
    "/usr/bin/vi",
    "/usr/bin/vim",
    "/usr/bin/vim.basic",
    "/usr/bin/watch",
    "/usr/bin/xxd",
    "/usr/sbin/arp",
    "/usr/sbin/ifconfig",
    "/usr/sbin/route",
]
# net-tools (ifconfig/route/arp) live in /usr/sbin; put it on PATH so they resolve
# by name. Landlock EXECUTE is independent of PATH (the absolute allow entries above
# are what grant execution); this is purely so `ifconfig` is found.
path = ["/usr/bin", "/usr/local/bin", "/bin", "/usr/sbin", "/sbin"]

[lifecycle]
ttl = "12h"
ttl_action = "warn"



