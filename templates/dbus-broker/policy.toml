# ============================================================================
# Template: dbus-broker  (v1)
# Inherits: base-confined@v1
# Threat catalogue: THREATS.md v0.4
#
# The standing D-Bus mediation service kennel (§7.7): the intended replacement for the
# per-consumer host-dbus delegate — a single long-running broker that receives per-consumer
# filter sets from kenneld via the binder-connector mesh and mediates relayed D-Bus frames.
#
# The frame relay is not yet implemented (the broker is a stub); D-Bus mediation currently
# flows through the legacy host-dbus delegate. This template is the deployment shape for the
# broker once the relay lands — started when the first D-Bus consumer connects and kept
# running (restart = on-failure) until all consumers exit.
#
# Shape:
#   * [[provides]] a binder-connector for kenneld's REGISTER_CONSUMER push.
#   * [[provides]] a dbus-name shape for consumers that [[consumes]] D-Bus.
#   * The real session-bus socket is bind-mounted into the broker's view via
#     the base-confined unix section.
#   * [service] restart = "on-failure".
#   * Minimal [fs]: the real bus socket, nothing else.
#
# Defends: T1.6 (sandbox escapes via D-Bus — the filter is the real boundary).
# ============================================================================

template_name = "dbus-broker"
template_version = "1"
template_base = "base-confined@v1"


# --- Service lifecycle -------------------------------------------------------
# Restart on failure (a clean exit is intentional); default backoff doubles
# from 500ms, up to 8 attempts before declared-but-failed.
[service]
restart = "on-failure"


# --- Capabilities provided ---------------------------------------------------

# The control channel: kenneld pushes per-consumer filter sets here.
[[provides]]
name = "org.projectkennel.dbus-broker"
shape = "binder-connector"
endpoint = "/dev/binderfs-mesh/binder"
reason = "kenneld pushes per-consumer D-Bus filter sets to the broker's control node"

# The D-Bus mediation capability consumers reach.
[[provides]]
name = "org.projectkennel.dbus"
shape = "dbus-name"
endpoint = "org.freedesktop.DBus"
reason = "D-Bus mediation capability for consumer kennels"


# --- Execution ---------------------------------------------------------------
[exec]
allow = ["dbus-broker", "/bin/sh"]

# --- Network -----------------------------------------------------------------
# Inherited from base-confined: constrained mode (no proxy allowlist = no egress).

