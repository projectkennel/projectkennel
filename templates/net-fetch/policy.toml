# ============================================================================
# Spawn template: net-fetch  (v1)
# Inherits: base-confined@v1
# Threat catalogue: THREATS.md v0.3
#
# A single-leg SPAWN target (§7.12): reach WITHOUT code. `net.mode = "constrained"`
# (frozen — the proxy is the egress gate) is the one leg; no workspace write grant
# (no filesystem leg), and the fixed fetch entrypoint runs no agent-supplied code.
# An agent holding [spawn] instantiates this to fetch from the network and stream
# the bytes back over the spawn channel.
#
# Spawn-eligible (§7.12.8): no [spawn] of its own (depth-1), a self-reaping TTL,
# explicit memory/pids/CPU ceilings.
#
# The mutable surface (§7.12.3) is `net.proxy.allow` under a PATTERN constraint:
# the agent supplies concrete destinations not enumerated at sign time, admitted
# only if they match one signed shape (subdomain `*.suffix:port`, exact `host:port`).
# This governs the egress PROXY filter only — `[net.bpf]` is a separate mechanism,
# never touched. The residual is T3.9 R1 (the open-but-shaped value), bounded by the
# signed shapes below.
# ============================================================================

template_base = "base-confined@v1"
template_name = "net-fetch"
template_version = "1"


# --- Network: constrained egress via the proxy (frozen — the one leg) --------
[net]
mode = "constrained"


# --- Execution: the constructed-view fetch entrypoint ------------------------
[exec]
allow = ["/usr/libexec/kennel/mcp-fetch", "/bin/sh"]


# --- Workload: the fixed entrypoint; the agent cannot override it ------------
[workload]
argv = ["/usr/libexec/kennel/mcp-fetch"]
pinned = true


# --- Lifecycle: a self-reaping TTL (§7.12.7) --------------------------------
[lifecycle]
ttl = "10m"
ttl_action = "exit"


# --- Resource ceilings: mandatory for a spawn target (§7.12.8) --------------
[ulimits]
as = "512M"
nproc = "64"
cpu = "30"


# --- Mutable surface: the agent picks fetch destinations within signed shapes -
# Pattern constraint: an open `host:port`, admitted only if it matches one shape.
# Sane default shapes — the common public package/source hosts. Tighten or widen
# in a derived template; every shape is exact-port.
[[mutable]]
field = "net.proxy.allow"
match = [
    "pypi.org:443", "*.pypi.org:443", "files.pythonhosted.org:443",
    "registry.npmjs.org:443", "*.npmjs.org:443",
    "crates.io:443", "static.crates.io:443",
    "github.com:443", "*.githubusercontent.com:443", "ghcr.io:443",
]
