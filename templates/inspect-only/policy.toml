# ============================================================================
# Template: inspect-only  (v1)
# Inherits: base-confined@v1
# Threat catalogue: THREATS.md v0.3
#
# Reading a directory to decide whether to trust it — grep/cat/less over a freshly
# cloned repo — WITHOUT giving its build system any chance to run. Network off,
# nothing writable (beyond the kennel's own state), and the exec allowlist is text-
# inspection tools ONLY: no compiler, no interpreter, no build tool, no package
# manager. There is nothing in the kennel that can execute the repo's code.
#
# The user's leaf grants the read path; it adds no write and no exec (the strict
# allowlist is the point).
#
# Defends: T1.2, T1.4, T1.5 (strong). Residual: a CVE in an inspection tool itself
# (assumes vetted system tools).
# ============================================================================

template_base = "base-confined@v1"
template_name = "inspect-only"
template_version = "1"


# --- Network: OFF -----------------------------------------------------------
[net]
mode = "none"


# --- Execution: text inspection only ----------------------------------------
# A shell is allowed so a session is usable, but under the Landlock exec-allowlist
# it can *only* invoke the read tools below — the repo's own code still cannot run.
# Conspicuously absent: any compiler, interpreter (python/node/perl/ruby), build
# tool, or package manager. `exec.shell` must appear in this allowlist (else the
# kennel could not launch its own login shell), so `/bin/sh` is listed explicitly.
[exec]
allow = [
    "/bin/sh", "/usr/bin/bash",
    "/usr/bin/cat", "/usr/bin/less", "/usr/bin/more",
    "/usr/bin/head", "/usr/bin/tail",
    "/usr/bin/grep", "/usr/bin/egrep", "/usr/bin/fgrep",
    "/usr/bin/find", "/usr/bin/tree", "/usr/bin/ls",
    "/usr/bin/file", "/usr/bin/strings", "/usr/bin/xxd", "/usr/bin/hexdump",
    "/usr/bin/wc", "/usr/bin/sort", "/usr/bin/uniq", "/usr/bin/cut",
    "/usr/bin/diff", "/usr/bin/stat", "/usr/bin/readlink", "/usr/bin/realpath",
]


# --- Lifecycle --------------------------------------------------------------
[lifecycle]
ttl = "2h"
ttl_action = "warn"

[signature]
algorithm = "ed25519"
key_id = "kennel-maint-2026"
signature = "g9d+RWwi51FC/jyATwsLCkLq/aDRGlhuObtxuJrVyknGE7zz9eaHtQjogW6w1OExXsTL/AW6yLog/7T0Dr7TCQ=="
