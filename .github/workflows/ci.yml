# Project Kennel CI gate (CODING-STANDARDS.md §14).
#
# What runs here today: formatting, clippy, tests, an offline/locked build,
# docs, the BPF compile check, the shell tooling tests, and the full supply-chain
# gate (cargo deny + cargo audit + cargo vet, via the pinned-binary install path
# below). The remaining §14 checks activate when their inputs exist and are
# tracked as owed (the notes below); CI must not claim to run a check it does not.
#
# The `supply-chain` job is a blocking gate: the tool-binary pins
# (src/tools/ci-tools.toml) are maintainer-ratified (§5.5), and all three checks have
# been observed green. A maintainer still must mark it a *required* status check
# in branch protection — that is a GitHub repo setting, not expressible here.
#
# Owed (land with the release infra):
#   - src/tools/verify-checksums (Rust) — needs sha2 (§5.5.1 bootstrap).
#   - reproducible-build double-build — needs the release-image (§BUILD-ENV).
#   - BPF verifier-load matrix (bpftool prog load on kernels >= 6.10) — needs
#     custom-kernel runners; the compile check below is the hosted-runner part.
#
# The `fuzz/` smoke test (a separate workspace; its `arbitrary` dep is vendored)
# runs in the `fuzz` job below.
#
# Third-party actions are kept to the GitHub-first-party `actions/*` org:
# actions/checkout, and actions/cache (used by the local composite action
# .github/actions/setup-build-deps to cache apt .deb archives — the runner apt
# mirrors are flaky, so build deps install cache-first with retry/backoff).
# Pinning both by full commit SHA (rather than the @v4 tag) is the recommended
# hardening once a maintainer records the audited SHAs.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # The Rust gate is split into four parallel jobs (was one serial `rust` job). With no
  # Rust build cache in CI, each cold-compiles the workspace, so splitting trades runner-
  # minutes for wall-clock: the four heavy steps (clippy, the two test profiles, the
  # build) now run concurrently instead of back to back. The `--all-features` jobs link
  # libsystemd (the `audit-journald` sink's sd_journal_sendv FFI); clang/libbpf cover the
  # BPF object the spawn crates embed via build.rs. fmt is trivial, so it rides the
  # build+doc job rather than spending a fifth runner.
  rust-clippy:
    name: rust (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang + headers
        uses: ./.github/actions/setup-build-deps
        with:
          packages: clang libbpf-dev linux-libc-dev libsystemd-dev
      - name: Toolchain
        run: rustup show && cargo --version && rustc --version
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  rust-test:
    name: rust (test, all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang + headers
        uses: ./.github/actions/setup-build-deps
        with:
          packages: clang libbpf-dev linux-libc-dev libsystemd-dev
      - name: Toolchain
        run: rustup show && cargo --version && rustc --version
      - name: Test (all features)
        run: cargo test --all-features

  rust-test-nodefault:
    name: rust (test, no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The no-default build does not link libsystemd, but the BPF object the spawn
      # crates embed (build.rs) still needs clang/libbpf.
      - name: Install clang + headers
        uses: ./.github/actions/setup-build-deps
        with:
          packages: clang libbpf-dev linux-libc-dev
      - name: Toolchain
        run: rustup show && cargo --version && rustc --version
      - name: Test (no default features)
        run: cargo test --no-default-features

  rust-build-doc:
    name: rust (fmt, build, doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang + headers
        uses: ./.github/actions/setup-build-deps
        with:
          packages: clang libbpf-dev linux-libc-dev libsystemd-dev
      - name: Toolchain
        run: rustup show && cargo --version && rustc --version
      - name: Format
        run: cargo fmt --all -- --check
      - name: Build (offline, frozen, locked)
        run: cargo build --offline --frozen --locked
      - name: Doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

  bpf-compile:
    name: bpf (compile, -Werror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang + headers
        uses: ./.github/actions/setup-build-deps
        with:
          packages: clang libbpf-dev linux-libc-dev
      # Compile every program against the kernel UAPI (<linux/bpf.h>), not a
      # vmlinux.h CO-RE dump: the programs touch only stable hook-context structs
      # and our own maps, so they need no CO-RE. -g keeps BTF (bpftool- and
      # kennel-bpf-loadable). The verifier-load matrix is owed (custom-kernel
      # runners); this catches compile regressions.
      - name: Compile all programs
        working-directory: src/bpf
        run: |
          set -euo pipefail
          for f in connect4 connect6 bind4 bind6 setsockopt sock_create sendmsg4 sendmsg6; do
            echo "::group::$f"
            clang -O2 -g -Wall -Wextra -Werror -target bpf -D__TARGET_ARCH_x86 \
              -I. -I/usr/include -I/usr/include/x86_64-linux-gnu -c "$f.bpf.c" -o "/tmp/$f.bpf.o"
            echo "::endgroup::"
          done
          echo "all 8 programs compiled clean (UAPI, no CO-RE)"

  fuzz:
    name: fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `fuzz/` is a separate workspace (it must not perturb the shipped
      # build/Cargo.lock); the main `cargo test` never reaches it. This runs the
      # no-panic corpus across every untrusted-input parser. `arbitrary` is
      # vendored in src/vendor/, so the run is offline like every other build.
      - name: Toolchain
        run: rustup show && cargo --version
      - name: Clippy (fuzz workspace)
        working-directory: src/fuzz
        run: cargo clippy --offline --locked --all-targets -- -D warnings
      - name: Fuzz smoke test
        working-directory: src/fuzz
        run: cargo test --offline --locked

  supply-chain:
    name: supply-chain (deny, audit, vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup show && cargo --version
      # Install cargo-deny/-audit/-vet from the pinned, hash-verified prebuilt
      # binaries. `cargo install` is impossible here: the offline
      # `.cargo/config.toml` replaces crates.io with the local registry, so the
      # tools' own dependency trees cannot resolve. The script verifies each
      # archive's SHA-256 against src/tools/ci-tools.toml before extracting it.
      - name: Install pinned tools
        run: |
          set -euo pipefail
          bindir="$(src/tools/install-ci-tools.sh)"
          echo "$bindir" >> "$GITHUB_PATH"
      # Licences, bans, sources (offline), and RustSec advisories (fetches the DB).
      - name: cargo deny
        run: cargo deny --all-features check
      # RustSec advisories against the locked graph (fetches the advisory DB).
      # The "couldn't update crates.io index" line is an expected, benign infra
      # warning from the local-registry source replacement, not an advisory
      # warning, so --deny warnings does not trip on it.
      - name: cargo audit
        run: cargo audit --deny warnings
      # The audit chain (supply-chain/): 11 of the 17 third-party crates are
      # fully audited (audits.toml), the rest exempted (config.toml). --locked
      # additionally requires the store to be cargo-vet-fmt canonical.
      - name: cargo vet
        run: cargo vet --locked

  tooling:
    name: tooling (shell tests + checksum witness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checksum witness (shell, §5.5.1)
        run: src/tools/verify-checksums.sh
      - name: Hook + tool tests
        run: |
          set -euo pipefail
          src/tools/git-hooks/tests/commit-msg.sh
          src/tools/tests/verify-checksums.sh
          src/tools/tests/audit-helper.sh
          src/tools/tests/audit-source.sh
          src/tools/tests/install-ci-tools.sh
          src/tools/tests/threats-catalogue.sh

  man:
    name: man (regen check + groff lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup show && cargo --version
      # --no-install-recommends: bare groff is a few MB; its Recommends pull
      # ghostscript + imagemagick + the urw-base35 font set (~37 MB / 107 MB on
      # disk) we never use for `-z` lint, which is what made this step slow
      # enough to be cancelled.
      - name: Install groff
        uses: ./.github/actions/setup-build-deps
        with:
          packages: groff
          no-install-recommends: "true"
      # Regenerate the committed pages; a non-empty diff means man/ is stale
      # relative to the page data (or the CLI tables the sync-test guards).
      - name: Regenerate man pages
        run: cargo run --offline --locked -p gen-man -- --out man
      - name: No drift (man/ matches the generator)
        run: git diff --exit-code man/
      - name: groff lint (no warnings)
        run: |
          set -euo pipefail
          for f in man/*.[1-9]; do
            out="$(groff -ww -man -z "$f" 2>&1)"
            if [ -n "$out" ]; then echo "::error file=$f::$out"; exit 1; fi
          done
          echo "all man pages lint clean"

  schema:
    name: schema (policy JSON Schema regen check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup show && cargo --version
      # Regenerate the committed policy schema; a non-empty diff means
      # schema/policy.toml.schema is stale relative to gen_schema::model. The
      # schema↔parser agreement itself is enforced by the cross-check test
      # (kennel-lib-compile/tests/schema_parser_crosscheck.rs) in the rust-test job.
      - name: Regenerate the policy schema
        run: cargo run --offline --locked -p gen-schema -- --out schema/policy.toml.schema
      - name: No drift (schema/ matches the generator)
        run: git diff --exit-code schema/
      - name: Schema is valid JSON
        run: python3 -c "import json,sys; json.load(open('schema/policy.toml.schema'))"
