# Project Kennel CI gate (CODING-STANDARDS.md §14).
#
# What runs here today: formatting, clippy, tests, an offline/locked build,
# docs, the BPF compile check, the shell tooling tests, and the supply-chain
# gate (cargo deny + cargo audit, via the pinned-binary install path below).
# The remaining §14 checks activate when their inputs exist and are tracked as
# owed (see the `supply-chain` job and the notes below); CI must not claim to
# run a check it does not.
#
# The `supply-chain` job is `continue-on-error` (advisory, not blocking): the
# pinned tool binaries in tools/ci-tools.toml are verified by hash but their
# §5.5 second-approval cross-verification is still PENDING. A maintainer makes
# this gate required (branch protection) once those entries are ratified.
#
# Owed (land with the release infra):
#   - tools/verify-checksums (Rust) — needs sha2 (§5.5.1 bootstrap).
#   - cargo vet --locked — the tool installs (below), but its audit corpus
#     (supply-chain/audits.toml: a human sign-off per crate) is not yet written,
#     so the check cannot gate. Tracked in tools/README.md; the in-repo §5.5
#     ledger (CHECKSUMS.toml + tools/audit-source.sh) is the audit-of-record today.
#   - reproducible-build double-build — needs the release-image (§BUILD-ENV).
#   - BPF verifier-load matrix (bpftool prog load on kernels >= 6.10) — needs
#     custom-kernel runners; the compile check below is the hosted-runner part.
#
# The `fuzz/` smoke test (a separate workspace; its `arbitrary` dep is vendored)
# runs in the `fuzz` job below.
#
# Third-party actions are kept to actions/checkout. Pinning it by full commit
# SHA (rather than the @v4 tag) is the recommended hardening once a maintainer
# records the audited SHA.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust (fmt, clippy, test, build, doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup honours rust-toolchain.toml (1.95.0 + rustfmt + clippy); the
      # first cargo invocation installs the pinned toolchain and components.
      - name: Toolchain
        run: rustup show && cargo --version && rustc --version
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test (all features)
        run: cargo test --all-features
      - name: Test (no default features)
        run: cargo test --no-default-features
      - name: Build (offline, frozen, locked)
        run: cargo build --offline --frozen --locked
      - name: Doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

  bpf-compile:
    name: bpf (compile, -Werror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang + headers
        run: sudo apt-get update && sudo apt-get install -y clang libbpf-dev linux-libc-dev
      # Compile every program against the kernel UAPI (<linux/bpf.h>), not a
      # vmlinux.h CO-RE dump: the programs touch only stable hook-context structs
      # and our own maps, so they need no CO-RE. -g keeps BTF (bpftool- and
      # kennel-bpf-loadable). The verifier-load matrix is owed (custom-kernel
      # runners); this catches compile regressions.
      - name: Compile all programs
        working-directory: bpf
        run: |
          set -euo pipefail
          for f in connect4 connect6 bind4 bind6 setsockopt sock_create sendmsg4 sendmsg6; do
            echo "::group::$f"
            clang -O2 -g -Wall -Wextra -Werror -target bpf -D__TARGET_ARCH_x86 \
              -I. -I/usr/include -I/usr/include/x86_64-linux-gnu -c "$f.bpf.c" -o "/tmp/$f.bpf.o"
            echo "::endgroup::"
          done
          echo "all 8 programs compiled clean (UAPI, no CO-RE)"

  fuzz:
    name: fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `fuzz/` is a separate workspace (it must not perturb the shipped
      # build/Cargo.lock); the main `cargo test` never reaches it. This runs the
      # no-panic corpus across every untrusted-input parser. `arbitrary` is
      # vendored in crates-archive/, so the run is offline like every other build.
      - name: Toolchain
        run: rustup show && cargo --version
      - name: Clippy (fuzz workspace)
        working-directory: fuzz
        run: cargo clippy --offline --locked --all-targets -- -D warnings
      - name: Fuzz smoke test
        working-directory: fuzz
        run: cargo test --offline --locked

  supply-chain:
    name: supply-chain (deny, audit)
    runs-on: ubuntu-latest
    # Advisory until the tool-binary pins in tools/ci-tools.toml clear their
    # §5.5 second approval. The job runs the real checks and surfaces results;
    # it does not block merge. Flip to a required check (and drop this line)
    # once ci-tools.toml is ratified.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: rustup show && cargo --version
      # Install cargo-deny/-audit from the pinned, hash-verified prebuilt
      # binaries. `cargo install` is impossible here: the offline
      # `.cargo/config.toml` replaces crates.io with the local registry, so the
      # tools' own dependency trees cannot resolve. The script verifies each
      # archive's SHA-256 against tools/ci-tools.toml before extracting it.
      - name: Install pinned tools
        run: |
          set -euo pipefail
          bindir="$(tools/install-ci-tools.sh)"
          echo "$bindir" >> "$GITHUB_PATH"
      # Licences, bans, sources (offline), and RustSec advisories (fetches the DB).
      - name: cargo deny
        run: cargo deny --all-features check
      # RustSec advisories against the locked graph (fetches the advisory DB).
      - name: cargo audit
        run: cargo audit --deny warnings
      # cargo vet --locked is owed: the audit corpus (supply-chain/) is not yet
      # written. cargo-vet is installed by the step above, ready for that work.

  tooling:
    name: tooling (shell tests + checksum witness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checksum witness (shell, §5.5.1)
        run: tools/verify-checksums.sh
      - name: Hook + tool tests
        run: |
          set -euo pipefail
          tools/git-hooks/tests/commit-msg.sh
          tools/tests/verify-checksums.sh
          tools/tests/audit-helper.sh
          tools/tests/audit-source.sh
          tools/tests/install-ci-tools.sh
