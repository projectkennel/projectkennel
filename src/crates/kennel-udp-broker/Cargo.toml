[package]
name = "kennel-udp-broker"
version.workspace = true
publish.workspace = true
description = "Project Kennel W2 UDP-egress fenced flow broker: a per-kennel host-mode leaf running the DNS naming shim (mint a synthetic IPv6 on allowlist approval, answer AAAA / NODATA, zero wire) and the L3 flow forwarder that drives host-netproxy's UDP dial. kenneld is absent from the per-flow path; the broker cgroup's net.bpf deny-first floor is the IP-layer fence that closes DNS rebinding at connect()."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
# The DNS message codec for the naming shim: parse the workload's (hostile) query, build the
# AAAA/NODATA response. Delegated as the hostile-input parser the no-hand-roll rule targets (the
# `vte` precedent, §5.1); the shim only mints synthetics — no resolver, no wire. Only transitive is
# `bitflags`, already vendored via `nix`.
simple-dns = "=0.11.3"
# The settled allowlist grants (`udp_allow_names: Vec<NameRule>`) and the shared `name_matches`
# dot-convention — the single source the egress proxy also uses, so the two cannot drift.
kennel-lib-policy = { path = "../kennel-lib-policy" }
# The curated epoll `Poller` the event loop multiplexes on (facade channel + per-flow sockets),
# keeping this leaf `#![forbid(unsafe_code)]` and never naming `nix` directly.
kennel-lib-syscall = { path = "../kennel-lib-syscall" }
# The mesh-service binder client (Connection, ADD_SERVICE, the ACCEPT_SESSION control verb): the
# broker is a standing mesh service kennel, reached over the connector mesh bus like dbus-broker.
kennel-lib-binder = { path = "../kennel-lib-binder" }

[lints]
workspace = true
