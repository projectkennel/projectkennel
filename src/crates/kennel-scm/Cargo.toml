[package]
name = "kennel-scm"
version.workspace = true
publish.workspace = true
description = "Project Kennel SCM_RIGHTS fd-passing over AF_UNIX: the sendmsg/recvmsg/SCM_RIGHTS + socketpair + SO_PEERCRED helpers (a small unsafe-bearing crate, parallel to kennel-landlock/kennel-bpf/kennel-binder), split out of kennel-syscall and re-exported by it so dumb delegates like kennel-netproxy can receive a conduit fd without pulling the whole unsafe crate. CODING-STANDARDS §4."
