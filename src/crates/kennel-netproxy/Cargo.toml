[package]
name = "kennel-netproxy"
version.workspace = true
publish.workspace = true
description = "Project Kennel per-kennel egress broker: the only network destination a confined workload may reach. Auto-detects SOCKS5 or HTTP-proxy on one listener, resolves names under policy, enforces a per-destination allowlist, and writes a structured audit record per request."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
serde = { version = "=1.0.228", default-features = false, features = ["std", "derive"] }
basic-toml = "=0.1.10"
# The unified audit writer (02-3): egress records emit through it, so they reach
# the same sinks (file/stdout/syslog/journald) the policy selected.
kennel-audit = { path = "../kennel-audit" }

[features]
# Build the journald audit sink (links libsystemd via kennel-audit).
audit-journald = ["kennel-audit/audit-journald"]

[lints]
workspace = true

[[bin]]
name = "kennel-netproxy"
path = "src/main.rs"
