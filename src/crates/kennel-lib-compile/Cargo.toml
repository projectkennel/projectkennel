[package]
name = "kennel-lib-compile"
version.workspace = true
publish.workspace = true
description = "Project Kennel policy compiler: the authoring front end that resolves a source policy (template chain, includes, leaf deltas) and translates it into the signed settled artefact the runtime enforces. Parsing, validation, template resolution, source signing, the lockfile, lint, and risk evaluation. Linked only by the `kennel` CLI — kept out of the daemon's TCB (the runtime `kennel-lib-policy` crate is what kenneld/spawn link)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
# The runtime policy crate: the settled-artefact types this compiler produces, the
# signature/canonical/keys crypto it signs through, the invariant validator, and the
# audit schema (single source of truth, shared).
kennel-lib-policy = { path = "../kennel-lib-policy" }
# The control-socket path recogniser (W10): the compiler refuses any grant whose target is the
# kenneld control socket — the CLI→daemon trust boundary — at install (the loud primary guard).
kennel-lib-control = { path = "../kennel-lib-control" }
# The host-declared reserved-namespace table (`system.toml` `[[reserved]]`): the compiler is the
# tier-aware authorizer for reserved capability names (§7.13.5), so it reads the same table the
# operator declares. Config types only — no enforcement code, kept out of the daemon's TCB.
kennel-lib-config = { path = "../kennel-lib-config" }
# Source and settled policies are TOML (no JSON); serde derives the schema types.
serde = { version = "=1.0.228", default-features = false, features = ["std", "derive"] }
basic-toml = "=0.1.10"
# Schema single-source (behind the `schema` feature, off by default → never in the
# runtime/TCB build): the source structs derive their JSON-Schema node, so `gen-schema`
# emits `schema/policy.toml.schema` directly from these parser structs — no hand mirror.
kennel-schema = { path = "../kennel-schema", optional = true }
kennel-schema-derive = { path = "../kennel-schema-derive", optional = true }

[features]
# Reflect the source structs into their schema nodes. Tooling/build-time only; pulls the
# same reflection into the policy crate it shares schema types with.
schema = ["dep:kennel-schema", "dep:kennel-schema-derive", "kennel-lib-policy/schema"]

[dev-dependencies]
# The policy-schema generator, for the schema↔parser cross-check test
# (tests/schema_parser_crosscheck.rs): regenerates the schema from these structs and
# asserts it matches the committed artefact. Dev-only — never linked into any shipped binary.
gen-schema = { path = "../../tools/gen-schema" }

[lints]
workspace = true
