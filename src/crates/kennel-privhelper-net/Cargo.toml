[package]
name = "kennel-privhelper-net"
version.workspace = true
publish.workspace = true
description = "Project Kennel bind-mirror network sub-helper: adds/removes a kennel's per-instance host-lo loopback address (CAP_NET_ADMIN), gated to the caller's reserved subnet. Invoked only by the kennel-privhelper construct orchestration, and only when a policy binds mirrored ports."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
kennel-lib-syscall = { path = "../kennel-lib-syscall" }
# The shared gating: the subkennel allocation lookup (`alloc`) and the reserved-scope
# address validation (`validate`). (To be slimmed to a `kennel-privhelper-core` lib so this
# thin helper does not link the factory; tracked in the W14 build plan.)
kennel-privhelper = { path = "../kennel-privhelper" }

[lints]
workspace = true

[[bin]]
name = "kennel-privhelper-net"
path = "src/main.rs"
