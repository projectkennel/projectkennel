[package]
name = "kennel-syscall"
version.workspace = true
publish.workspace = true
description = "Project Kennel low-level system-call and path primitives. The single crate permitted to contain `unsafe` (Linux syscalls, namespaces, Landlock/seccomp, FFI); the portable, std-only path-canonicalisation helper lands first while the crate is still unsafe-free."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
# The libc bindings underlying the safe syscall wrappers. Exact pin per §5.4;
# vendored in src/vendor/ and recorded in CHECKSUMS.toml / DEPENDENCIES.md
# per §5.5. libc itself has no (non-optional) dependencies.
libc = "=0.2.186"
# nix: safe, typed wrappers over the syscalls we would otherwise hand-roll
# `unsafe` (CODING-STANDARDS.md §4 — prefer a vetted crate to our own unsafe).
# default-features off; features added pay-as-you-go as each wrapper lands.
nix = { version = "=0.31.3", default-features = false, features = ["user", "process", "sched", "mount", "fs"] }
# bitflags: typed access-right sets for the hand-rolled Landlock bindings.
# Already vendored/approved (it is also a transitive of nix); promoted to a
# direct dependency here because landlock.rs uses it directly.
bitflags = "=2.11.1"
# seccompiler: compile/install seccomp-BPF filters. Hand-rolling BPF
# bytecode is the dangerous case (§4), so we use the vetted rust-vmm crate.
# Default features only (no json/serde). Unused until the seccomp wrapper lands.
seccompiler = "=0.5.0"

[features]
# Tests that need privilege (namespace/mount ops). Off by default so the normal
# `cargo test` runs unprivileged; CI/maintainers run `sudo -E cargo test
# --features root-tests` (CODING-STANDARDS.md / 03-crate-decomposition.md).
root-tests = []
# Compiles the `journal` module and links libsystemd for the journald audit
# sink (sd_journal_sendv FFI). Off by default; enabled transitively by
# kennel-audit's `audit-journald` feature. Needs libsystemd-dev to build.
audit-journald = []

[lints]
workspace = true
