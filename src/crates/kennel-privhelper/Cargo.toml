[package]
name = "kennel-privhelper"
version.workspace = true
publish.workspace = true
description = "Project Kennel privileged-operation helper: validates and performs the minimal set of privileged operations (loopback address and cgroup management) for a kennel, refusing anything outside Project Kennel's reserved scope."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
kennel-lib-syscall = { path = "../kennel-lib-syscall" }
# The factory parses the ConstructionHalf and reuses the view-construction logic
# (07-2 §7.11.1). This grows the setuid TCB; held to the same bar as the rest.
kennel-lib-spawn = { path = "../kennel-lib-spawn" }
# The factory resolves the kennel-bin-init binary from the root-owned deployment cascade
# itself (never the wire), so a compromised operator cannot choose what runs as the
# kennel's uid 0 (07-2; sec review: trusted init source).
kennel-lib-config = { path = "../kennel-lib-config" }
# Only pulled in (and only then is clang needed at build time) when the
# bpf-egress feature is on; a plain `cargo build` of the helper stays clang-free.
kennel-lib-bpf = { path = "../kennel-lib-bpf", optional = true }

[features]
# Egress BPF setup (Op::SetupEgress). Embeds the cgroup BPF programs, so it
# requires clang at build time; the installed helper is built with it. Off by
# default to keep plain builds and the unprivileged test suite clang-free.
bpf-egress = ["dep:kennel-lib-bpf", "kennel-lib-bpf/embed-programs"]

# Tests that need privilege (real cgroup/address/BPF ops). Implies bpf-egress so
# the egress e2e test can attach real programs. Run via:
#   sudo -E env PATH=$PATH cargo test -p kennel-privhelper --features e2e
e2e = ["bpf-egress"]

[dev-dependencies]
# The integration tests use the effective-uid primitive to skip the
# privilege-requiring cases with cause on an unprivileged runner (a skip is not
# a proof). Already a normal dependency; re-listed so `tests/` can use it directly.
kennel-lib-syscall = { path = "../kennel-lib-syscall" }

[lints]
workspace = true

[[bin]]
name = "kennel-privhelper"
path = "src/main.rs"
