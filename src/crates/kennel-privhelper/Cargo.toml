[package]
name = "kennel-privhelper"
version.workspace = true
publish.workspace = true
description = "Project Kennel privileged-operation helper: validates and performs the minimal set of privileged operations (loopback address and cgroup management) for a kennel, refusing anything outside Project Kennel's reserved scope."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
kennel-lib-syscall = { path = "../kennel-lib-syscall" }
# The factory parses the ConstructionHalf and reuses the view-construction logic
# (07-2 §7.11.1). This grows the setuid TCB; held to the same bar as the rest.
kennel-lib-spawn = { path = "../kennel-lib-spawn" }
# The factory resolves the kennel-bin-init binary from the root-owned deployment cascade
# itself (never the wire), so a compromised operator cannot choose what runs as the
# kennel's uid 0 (07-2; sec review: trusted init source).
kennel-lib-config = { path = "../kennel-lib-config" }
# Linked only by the kennel-privhelper-bpf binary (which gates on the bpf-egress feature via its
# required-features). It embeds the cgroup egress programs, so it needs clang at build time — a
# plain build of the factory and the net/mounts sub-helpers stays clang-free.
kennel-lib-bpf = { path = "../kennel-lib-bpf", optional = true }

[features]
# Builds the kennel-privhelper-bpf binary (which requires it): pulls kennel-lib-bpf and embeds the
# cgroup egress programs (clang at build time).
bpf-egress = ["dep:kennel-lib-bpf", "kennel-lib-bpf/embed-programs"]

# Tests that need privilege (real cgroup / address ops). Run via:
#   sudo -E env PATH=$PATH cargo test -p kennel-privhelper --features e2e
e2e = []

[dev-dependencies]
# The integration tests use the effective-uid primitive to skip the
# privilege-requiring cases with cause on an unprivileged runner (a skip is not
# a proof). Already a normal dependency; re-listed so `tests/` can use it directly.
kennel-lib-syscall = { path = "../kennel-lib-syscall" }

[lints]
workspace = true

# The privhelper factory.
[[bin]]
name = "kennel-privhelper"
path = "src/main.rs"

# The capability-split sub-helpers: one binary per privileged construction step, each installed
# with only its own file capability. The factory execs them; its own binary carries none of their
# code. The BPF helper is the only one needing clang, so it is gated behind bpf-egress.
[[bin]]
name = "kennel-privhelper-net"
path = "src/bin/privhelper-net.rs"

[[bin]]
name = "kennel-privhelper-mounts"
path = "src/bin/privhelper-mounts.rs"

[[bin]]
name = "kennel-privhelper-bpf"
path = "src/bin/privhelper-bpf.rs"
required-features = ["bpf-egress"]
