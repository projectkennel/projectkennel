[package]
name = "kennel-socks-connect"
version.workspace = true
publish.workspace = true
description = "Project Kennel SOCKS5 connect helper: the tiny stdio proxy a confined kennel uses as an ssh ProxyCommand to reach the SSH bastion through its egress proxy. ssh has no built-in SOCKS client; this speaks SOCKS5 CONNECT to the kennel's proxy and splices stdin/stdout to the resulting stream, so no SOCKS-capable tool need exist in the workload image."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[lints]
workspace = true

[[bin]]
name = "kennel-socks-connect"
path = "src/main.rs"
