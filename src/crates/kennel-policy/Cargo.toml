[package]
name = "kennel-policy"
version.workspace = true
publish.workspace = true
description = "Project Kennel policy crate: settled-policy types, the canonical-form serialisation, and Ed25519 signature verification (the runtime trust surface consumed by kennel-spawn). Pure and I/O-free; callers supply bytes."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
serde = { version = "=1.0.228", default-features = false, features = ["std", "derive"] }
basic-toml = "=0.1.10"
ed25519-compact = { version = "=2.3.0", default-features = false, features = ["std"] }
# ELF inspection for the compile-time shared-library closure (DT_NEEDED + PT_INTERP);
# read-only, the inspected binary is never executed. Same pin as kennel-bpf.
object = { version = "=0.36.7", default-features = false, features = ["read_core", "elf", "std"] }

[lints]
workspace = true
