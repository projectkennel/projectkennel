[package]
name = "kennel-lib-syscall"
version.workspace = true
publish.workspace = true
description = "Project Kennel low-level system-call primitives. The single crate permitted to contain `unsafe` (Linux syscalls, namespaces, Landlock/seccomp, FFI). The safe, no-`unsafe` helpers (path, uid/gid, netlink, handshake) live in `kennel-lib-os` and are re-exported here, so this crate carries only genuinely-unsafe code (CODING-STANDARDS §4)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
# The libc bindings underlying the safe syscall wrappers. Exact pin per §5.4;
# vendored in src/vendor/ and recorded in CHECKSUMS.toml / DEPENDENCIES.md
# per §5.5. libc itself has no (non-optional) dependencies.
libc = "=0.2.186"
# kennel-lib-os: the safe (no-`unsafe`) OS helpers split out of this crate (path, unistd, netlink,
# handshake), re-exported from lib.rs so this crate's public surface is unchanged.
kennel-lib-os = { path = "../kennel-lib-os" }
# kennel-lib-landlock: the hand-rolled Landlock ABI, split out as its own unsafe-bearing crate
# (parallel to kennel-lib-bpf/binder) and re-exported as `kennel_lib_syscall::landlock`.
kennel-lib-landlock = { path = "../kennel-lib-landlock" }
# kennel-lib-scm: SCM_RIGHTS fd-passing, split out as its own small unsafe-bearing crate and
# re-exported as `kennel_lib_syscall::scm` (so dumb delegates can use it without this whole crate).
kennel-lib-scm = { path = "../kennel-lib-scm" }
# nix: safe, typed wrappers over the syscalls we would otherwise hand-roll
# `unsafe` (CODING-STANDARDS.md §4 — prefer a vetted crate to our own unsafe).
# default-features off; features added pay-as-you-go as each wrapper lands.
nix = { version = "=0.31.3", default-features = false, features = ["user", "process", "resource", "sched", "mount", "fs", "socket", "net", "term", "signal", "inotify"] }
# bitflags: typed flag sets for the namespace/clone bindings (the Landlock access-right sets
# moved to kennel-lib-landlock with that module). Already vendored/approved (also a transitive of
# nix); a direct dependency here because namespace.rs uses it directly.
bitflags = "=2.11.1"
# seccompiler: compile/install seccomp-BPF filters. Hand-rolling BPF
# bytecode is the dangerous case (§4), so we use the vetted rust-vmm crate.
# Default features only (no json/serde). Unused until the seccomp wrapper lands.
seccompiler = "=0.5.0"

[features]
# Tests that need privilege (namespace/mount ops). Off by default so the normal
# `cargo test` runs unprivileged; CI/maintainers run `sudo -E cargo test
# --features e2e` (CODING-STANDARDS.md / 03-crate-decomposition.md). Propagates to kennel-lib-os so
# its re-exported `unistd::skip_if_unprivileged` test helper is available to this crate's tests.
e2e = ["kennel-lib-os/e2e"]
# Compiles the `journal` module and links libsystemd for the journald audit
# sink (sd_journal_sendv FFI). Off by default; enabled transitively by
# kennel-lib-audit's `audit-journald` feature. Needs libsystemd-dev to build.
audit-journald = []

[lints]
workspace = true
