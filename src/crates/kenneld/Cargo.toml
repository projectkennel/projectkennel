[package]
name = "kenneld"
version.workspace = true
publish.workspace = true
description = "Project Kennel orchestrator: brings up a kennel (cgroup, loopback addresses, BPF egress via the privhelper) and spawns the confined workload, tearing the whole lot down on exit. Runs unprivileged as a systemd user service; privilege is borrowed transiently through the setuid privhelper."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
kennel-lib-spawn = { path = "../kennel-lib-spawn" }
kennel-privhelper = { path = "../kennel-privhelper" }
kennel-lib-policy = { path = "../kennel-lib-policy" }
kennel-lib-syscall = { path = "../kennel-lib-syscall" }
# The control-socket wire protocol (Request/Response framing + socket path),
# shared with the `kennel` CLI. Re-exported as `kenneld::{control, socket}`; the
# daemon serves it, the CLI dials it. No serde, no enforcement code.
kennel-lib-control = { path = "../kennel-lib-control" }
# The layered deployment config (07-paths.md): resolves the helper-binary
# locations and the trust store from root-owned TOML, so no install path is
# baked into this binary.
kennel-lib-config = { path = "../kennel-lib-config" }
# The unified audit writer (02-3): kenneld builds it from the settled
# AuditRuntime and emits lifecycle events through it.
kennel-lib-audit = { path = "../kennel-lib-audit" }
# The BPF loader/ringbuf surface (02-7): kenneld reopens the pinned per-kennel
# audit ringbuf and drains it. No `embed-programs` — kenneld never loads BPF
# (the privhelper does), so this stays clang-free.
kennel-lib-bpf = { path = "../kennel-lib-bpf" }
# The binder IPC context manager (07-1/02-4): kenneld owns node 0 of each kennel's
# binderfs instance and gates the registry against the settled [binder] policy.
kennel-lib-binder = { path = "../kennel-lib-binder" }
# Writing the per-kennel egress-proxy TOML config (kenneld writes, the netproxy
# reads). Both already vendored (kennel-lib-policy/host-netproxy use them).
serde = { version = "=1.0.228", default-features = false, features = ["std", "derive"] }
basic-toml = "=0.1.10"
# The host-side conduit delegates' shared wire (the `netproxy` + `inetd` library modules):
# kenneld reuses the netproxy conduit codec for the INet egress decision (§7.5.2, crate::inet),
# round-trips the proxy config through the netproxy parser (writer can't drift), and uses the
# inetd encode_bind/encode_notify codec to register mirror ports + decode accept notifications
# (§7.5.7). It links the library only; the two delegate binaries run as separate processes.
kennel-host-delegate = { path = "../kennel-host-delegate" }

[dev-dependencies]
# The BPF-drain root test forks a child into a cgroup and attempts a connect to
# produce a real denied-connect audit event; libc gives it fork/connect/_exit.
libc = "=0.2.186"
# Test-only: the `sample_settled` fixture for building/signing provider policies in the
# enablement-scan and catalogue tests (off in the default daemon build).
kennel-lib-policy = { path = "../kennel-lib-policy", features = ["test-support"] }

[features]
# End-to-end orchestration test that drives the real setuid privhelper and
# performs real privileged operations (addresses, BPF attach). Requires root and
# the privhelper built with its bpf-egress feature.
e2e = ["kennel-lib-spawn/e2e", "kennel-lib-bpf/embed-programs"]
# Build the journald audit sink (links libsystemd via kennel-lib-syscall's FFI).
audit-journald = ["kennel-lib-audit/audit-journald"]

[lints]
workspace = true
