# ============================================================================
# Suite case: dbus-session-allowed — the full D-Bus mediation path, allow side (§7.7).
#
# `[dbus.session]` enables the session bus and grants `talk` to the bus driver
# `org.freedesktop.DBus` — and that section alone IS the brokered path (W4): kenneld implies the
# `org.projectkennel.dbus` consume, seals facade-dbus into the view (the workload's
# DBUS_SESSION_BUS_ADDRESS points at its in-view socket), and the facade reaches the standing
# dbus-broker over the connector mesh. No `[[consumes]]` is spelled out here on purpose — this
# case is the proof that a bare `[dbus.session]` policy routes over the broker.
#
# The workload runs a real D-Bus client (`dbus-send --print-reply`) against the facade and calls
# `org.freedesktop.DBus.GetId`. That exercises the whole round trip: SASL + the locally-answered
# Hello at the facade, the SVC_CONNECT locator + mesh session mint, the broker's allowlist pass +
# reconstruction onto the real bus, and the reply demultiplexed back via DBUS_RECV. `dbus-send`
# exits 0 iff it received the reply — so the kennel's exit code IS the verdict that the allowed
# call completed end to end (and that the ondemand broker socket-activated).
# ============================================================================

template_name = "dbus-session-allowed"
template_base = "base-confined"

[dbus.session]
enabled = true

[dbus.session.allow]
talk = ["org.freedesktop.DBus"]

[fs]
read = ["/usr/**", "/lib/**", "/lib64/**"]

[exec]
shell = "/bin/sh"
allow = ["/bin/sh", "/bin/dash", "/usr/bin/dbus-send"]

[workload]
argv = [
    "/usr/bin/dbus-send",
    "--session",
    "--print-reply",
    "--dest=org.freedesktop.DBus",
    "/org/freedesktop/DBus",
    "org.freedesktop.DBus.GetId",
]
