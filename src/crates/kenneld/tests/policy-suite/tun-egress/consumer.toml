# ============================================================================
# tun-egress — the CONSUMER half + the verdict (§8 / W2 Part C+D).
#
# A `[net.udp]` kennel whose UDP egress is mediated by the standing tun-broker over a plain af-unix
# session (the compositor-broker pattern, NOT binder message passing). `[net.udp]` alone drives it
# (the W4 mechanism, applied to W2): the section implies the `org.projectkennel.tun-udp` af-unix
# consume — kenneld synthesizes it, so no `[[consumes]]` is spelled out here ON PURPOSE; this case
# is the proof that a bare `[net.udp]` policy reaches the broker (an explicit consume remains
# valid and equivalent). kenneld constructs a `tun` in the kennel's netns, seals `facade-tun` into
# the view; on the per-kennel bus the facade `CONNECT_AFUNIX`es the capability, kenneld resolves
# THIS consumer's grants + tun `/64`, delivers them to the broker's sink, and hands back the
# broker's minted per-session socket — the af-unix channel frames flow over.
#
# The workload proves the tun is present in the kennel's own netns (the construction half, Part B); the
# facade↔broker frame path (Part C/D) is exercised by `facade-tun` connecting the broker on bring-up —
# a failed consume leaves no facade and UDP egress dead. The kennel's exit code IS the verdict.
# ============================================================================

name = "tun-consumer"
template_base = "base-confined"

[net]
mode = "constrained"

[net.udp]

[[net.udp.allow]]
name = "example.com"
ports = [443]
reason = "W2 tun-egress e2e: an allowed UDP destination the broker's naming shim mints a synthetic for"

# `/proc` (not `/proc/net/dev`): /proc/net is the per-task `/proc/self/net` symlink, so a Landlock
# rule pinned to the specific inode does not match the workload's — the mount-rooted `/proc` grant does.
[fs]
read = ["/usr/**", "/lib/**", "/lib64/**", "/proc", "/etc/**"]

[exec]
shell = "/bin/sh"
allow = ["/bin/sh", "/bin/dash", "/usr/bin/getent"]

# The verdict drives the WHOLE naming path, not just tun existence (W2 exit criteria):
#   1. the tun interface is present (construction, Part B);
#   2. the ALLOWED name resolves — via glibc getaddrinfo through the kennel's resolv.conf, which
#      now points at the tun broker's ::2 shim — to a SYNTHETIC address in the tun ULA `/64`
#      (fd6b:6e...). That proves the shim minted it AND that no real resolution happened (a real
#      example.com AAAA would be 2606:2800:.../global unicast; a synthetic is the ULA). Zero wire.
#   3. a DENIED name is NODATA: getaddrinfo fails, no synthetic, no answer.
# The kennel's exit code IS the verdict; a broken resolver path (the old proxy-pointed resolv.conf)
# fails at step 2 with no synthetic.
[workload]
argv = [
    "/bin/sh", "-c",
    """
    tun=no; while read -r l; do case "$l" in *tun*) tun=yes ;; esac; done < /proc/net/dev
    [ "$tun" = yes ] || { echo "no tun interface" >&2; exit 1; }
    set -- $(getent ahostsv6 example.com 2>/dev/null); syn=$1
    case "$syn" in
        fd6b:6e*) ;;
        *) echo "allowed name did not mint a tun synthetic (got '$syn') - resolver path broken" >&2; exit 1 ;;
    esac
    echo "tun-egress: example.com resolved to synthetic $syn (via the broker shim)" >&2
    if getent ahostsv6 blocked.example.org >/dev/null 2>&1; then
        echo "denied name unexpectedly resolved (shim should NODATA it)" >&2; exit 1
    fi
    exit 0
    """,
]
