# ============================================================================
# tun-egress — the CONSUMER half + the verdict (§8 / W2 Part C+D).
#
# A `[net.udp]` kennel whose UDP egress is mediated by the standing tun-broker over a plain af-unix
# session (the compositor-broker pattern, NOT binder message passing). Two declarations drive that:
#   * `[net.udp]` + `[[net.udp.allow]]` opts into the tun path: kenneld constructs a `tun` in the
#     kennel's netns and seals `facade-tun` into the view to forward its L3 frames.
#   * `[[consumes]] org.projectkennel.tun-udp shape = "af-unix"` is the service-mesh pair with the
#     tun-broker's `[[provides]]`. On the per-kennel bus `facade-tun` `CONNECT_AFUNIX`es this name;
#     kenneld resolves THIS consumer's grants + tun `/64`, delivers them to the broker's sink, and
#     hands back the broker's minted per-session socket — the af-unix channel frames flow over.
#
# The workload proves the tun is present in the kennel's own netns (the construction half, Part B); the
# facade↔broker frame path (Part C/D) is exercised by `facade-tun` connecting the broker on bring-up —
# a failed consume leaves no facade and UDP egress dead. The kennel's exit code IS the verdict.
# ============================================================================

name = "tun-consumer"
template_base = "base-confined"

[net]
mode = "constrained"

[net.udp]

[[net.udp.allow]]
name = "example.com"
ports = [443]
reason = "W2 tun-egress e2e: an allowed UDP destination the broker's naming shim mints a synthetic for"

# The service-mesh pair with the tun-broker's `[[provides]]`: reaching the standing UDP-egress
# mediation. `facade-tun` connects this by name on the per-kennel bus; kenneld delivers this
# consumer's grants to the broker and returns the session socket.
[[consumes]]
name = "org.projectkennel.tun-udp"
shape = "af-unix"
required = true
reason = "reach the standing tun-broker's UDP-egress mediation over its per-session af-unix socket"

# `/proc` (not `/proc/net/dev`): /proc/net is the per-task `/proc/self/net` symlink, so a Landlock
# rule pinned to the specific inode does not match the workload's — the mount-rooted `/proc` grant does.
[fs]
read = ["/usr/**", "/lib/**", "/lib64/**", "/proc"]

[exec]
shell = "/bin/sh"
allow = ["/bin/sh", "/bin/dash"]

[workload]
argv = [
    "/bin/sh", "-c",
    """
    while read -r l; do case "$l" in *tun*) exit 0 ;; esac; done < /proc/net/dev
    echo "no tun interface in /proc/net/dev" >&2
    exit 1
    """,
]
