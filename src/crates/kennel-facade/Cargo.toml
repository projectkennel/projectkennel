[package]
name = "kennel-facade"
version.workspace = true
publish.workspace = true
description = "Project Kennel in-kennel binder-connector facades: the small proxies kennel-bin-init launches inside the constructed view. Each pushes one class of the workload's traffic across the binder gateway to kenneld √¢¬Ä¬î facade-socks5 (SOCKS5/HTTP egress), facade-afunix (AF_UNIX sockets), facade-ssh (ssh ProxyCommand), facade-client (inbound BIND mirror). No policy, no host socket: kenneld decides, resolves, and pins."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# One crate, four binaries (names preserved √¢¬Ä¬î kennel-bin-init resolves them by name).
autobins = false

[[bin]]
name = "facade-afunix"
path = "src/bin/facade-afunix.rs"

[[bin]]
name = "facade-socks5"
path = "src/bin/facade-socks5.rs"

[[bin]]
name = "facade-tun"
path = "src/bin/facade-tun.rs"

[[bin]]
name = "facade-client"
path = "src/bin/facade-client.rs"

[[bin]]
name = "facade-ssh"
path = "src/bin/facade-ssh.rs"

[[bin]]
name = "facade-dbus"
path = "src/bin/facade-dbus.rs"

# The in-cage spawn execution unit (W10): installed as `/usr/libexec/kennel-facades/spawn`, reached through
# the `kennel` shim (`kennel caps`, `kennel run`). Retires the `facade-spawn` name.
[[bin]]
name = "kennel-spawn"
path = "src/bin/kennel-spawn.rs"

# The in-kennel SPAWN round-trip probe √¢¬Ä¬î the reference workload-side spawn client and the
# `spawn-roundtrip` policy-suite case's requester workload (`02-10` √Ç¬ß7.12).
[[bin]]
name = "facade-spawn-probe"
path = "src/bin/facade-spawn-probe.rs"

# The in-kennel sequential SPAWN bench driver √¢¬Ä¬î the ephemeral half of the spinup profile
# (`tools/spawn-spinup.sh`): drives N back-to-back constructions to time the in-daemon SPAWN path.
[[bin]]
name = "facade-spawn-bench"
path = "src/bin/facade-spawn-bench.rs"

# The in-kennel mesh provide/consume round-trip probe ‚Äî the `mesh-roundtrip` policy-suite
# case's provider (serve) and consumer (connect) workloads (07-13 service-catalog).
[[bin]]
name = "facade-mesh-probe"
path = "src/bin/facade-mesh-probe.rs"

# The GUI service kennel's workload (07-14): listens on the kennel-to-kennel socket and spawns one
# nested compositor (cage/weston/sway) per accepted connection, folding it when the app disconnects.
[[bin]]
name = "compositor-broker"
path = "src/bin/compositor-broker.rs"

[dependencies]
# The binder client transaction surface every facade uses to reach node 0.
kennel-lib-binder = { path = "../kennel-lib-binder" }
# facade-tun (W2) adopts its inherited tun/broker fds at the fixed boot slots (safe wrappers
# over the isolated `unsafe`) ‚Äî the only facade that takes inherited fds rather than binding.
kennel-lib-syscall = { path = "../kennel-lib-syscall" }
# The shared CLI surface grammar (W10): the spawn unit's `run`/`--` convention is the host
# unit's, from one definition, so the two surfaces cannot drift.
kennel-lib-cli = { path = "../kennel-lib-cli" }
# The shared bidirectional splice (conduit relay) √¢¬Ä¬î used by facade-socks5 and
# facade-client after brokering a conduit fd; harmless for the two that do not.
kennel-lib-scm = { path = "../kennel-lib-scm" }
# The D-Bus mediation engine for facade-dbus (√Ç¬ß7.7): the typed conduit wire, the SASL
# handshake, message reconstruction, and the Facade connection state machine. Wraps the
# mini-sansio-dbus marshalling. Outside the daemon TCB (facades run confined in the kennel).
kennel-lib-dbus = { path = "../kennel-lib-dbus" }

[lints]
workspace = true
