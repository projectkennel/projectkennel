[package]
name = "kennel-lib-binder"
version.workspace = true
publish.workspace = true
description = "Project Kennel binder IPC: a hand-rolled binder(7)/binderfs ioctl loader over libc (the context-manager state machine and the consumer client), with no libbinder. The third crate permitted unsafe (the FFI to the binder ioctl ABI)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
libc = "=0.2.186"
# kennel-lib-syscall: the shared low-level primitives; used here for the wake eventfd
# (`kennel_lib_syscall::wake`) the looper pool polls alongside the binder device fd.
kennel-lib-syscall = { path = "../kennel-lib-syscall" }

[features]
e2e = []

[lints]
workspace = true
