# Project Kennel — CI tool binary manifest (CODING-STANDARDS.md §5.5, §14).
#
# The supply-chain gate (§14) runs `cargo deny`, `cargo audit`, and `cargo vet`.
# Those tools are not crates in our workspace and are not vendored under
# src/vendor/ — and they cannot be `cargo install`ed, because the offline
# `.cargo/config.toml` replaces crates.io with the local registry, so cargo can
# resolve no sources for them. The only remaining honest install path is to
# download the upstream-published prebuilt binary and verify its bytes against a
# checksum WE recorded after the §5.5 cross-verification.
#
# This file is to those binaries what CHECKSUMS.toml is to the vendored .crate
# files: the integrity ground truth. tools/install-ci-tools.sh downloads each
# `url`, checks its SHA-256 against `archive-sha256`, and refuses to proceed on
# any mismatch — or on a still-`PENDING` entry. A post-publish compromise of a
# GitHub release asset therefore cannot change what CI runs: the on-disk hash
# here is authoritative.
#
# LAYOUT — one `[tool."<name>"]` block per tool (the pinned `version`), then one
# `[tool."<name>".artifact."<arch>"]` block per pinned artifact, keyed by
# `uname -m` (x86_64, aarch64, …). The installer picks the artifact matching the
# host arch, so the gate runs identically on the x86_64 CI runners and on an
# aarch64 dev host. Where upstream publishes NO binary for an arch (cargo-vet has
# never shipped an aarch64 Linux asset), the fallback is an `artifact."source"`
# block: the pinned, hash-verified release SOURCE tarball, built at install time
# with `cargo install --locked`. Its integrity chain is the same shape — this
# manifest pins the tarball's SHA-256, the tarball's committed Cargo.lock pins
# every dependency's SHA-256, and cargo enforces the latter during the build —
# and it covers any arch the binary pins do not.
#
# §5.5 STATUS
#   x86_64 artifacts: maintainer-ratified (2026-06-03, remco). Each
#   `archive-sha256` was verified by an independent second download (fresh
#   fetch, re-hashed, byte-equal to the recorded value) and, where upstream
#   publishes a per-asset `.sha256`, confirmed byte-equal to that too.
#   aarch64 + source artifacts (added 2026-07-04): the same two verification
#   legs were performed (second download via the GitHub API asset endpoint,
#   byte-equal; upstream `.sha256` byte-equal where published) — `audited-by`
#   stays PENDING until a maintainer ratifies the recorded hashes.
#   Residual, knowingly accepted for all entries: both legs share the
#   GitHub-release origin, so a release-account compromise serving identical
#   bytes to every fetch is not excluded — the fully-independent leg (signed git
#   tag / third-party mirror) is not performed for these CI-only tools.
#   cargo-audit is the weakest of the three (no upstream per-asset checksum at
#   all; see its `notes`).
#
# Adding or bumping a tool follows the CHECKSUMS.toml procedure (tools/README.md
# §"CI tool binaries"): pin the exact release tag, fetch each arch's asset and
# its upstream `.sha256`, confirm equality, cross-check the release
# tag/signature, record the value, and obtain the second approval.

[tool."cargo-deny"]
version = "0.19.8"

[tool."cargo-deny".artifact."x86_64"]
target           = "x86_64-unknown-linux-musl"
url              = "https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.8/cargo-deny-0.19.8-x86_64-unknown-linux-musl.tar.gz"
archive-sha256   = "70e769ae3872e34d45132b17040859175e11401dc12dddb0303e0b8c7d088f3f"
bin-path         = "cargo-deny-0.19.8-x86_64-unknown-linux-musl/cargo-deny"
audited-by       = "remco"
audited-on       = "2026-06-03"
verified-against = [
    "independent second download, re-hashed — byte-equal to archive-sha256",
    "upstream release asset .sha256 (EmbarkStudios/cargo-deny tag 0.19.8) — byte-equal",
]
notes = "statically-linked musl build. Residual: both verification legs share the GitHub-release origin (§5.5 STATUS)"

[tool."cargo-deny".artifact."aarch64"]
target           = "aarch64-unknown-linux-musl"
url              = "https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.8/cargo-deny-0.19.8-aarch64-unknown-linux-musl.tar.gz"
archive-sha256   = "67ef48056523d27f58a527c5e49172bc24758f7b8147998d47219d45b181c354"
bin-path         = "cargo-deny-0.19.8-aarch64-unknown-linux-musl/cargo-deny"
audited-by       = "PENDING"
audited-on       = "2026-07-04"
verified-against = [
    "independent second download (GitHub API asset endpoint), re-hashed — byte-equal to archive-sha256",
    "upstream release asset .sha256 (EmbarkStudios/cargo-deny tag 0.19.8) — byte-equal",
]
notes = "statically-linked musl build. Residual: both verification legs share the GitHub-release origin (§5.5 STATUS)"

