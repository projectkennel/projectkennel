[package]
name = "gen-schema"
version.workspace = true
publish.workspace = true
description = "Project Kennel policy-schema generator (not shipped). Emits a JSON Schema (draft-07) for the authored policy TOML from an in-repo data table mirroring the kennel-lib-compile source structs, so `schema/policy.toml.schema` — which host editors read for completion + validation — stays in sync with the parser by construction. Std-only: no third-party dependencies."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# Std-only by design (CODING-STANDARDS §5.1 / the project's no-third-party-deps
# default). The schema data lives in `model.rs` as plain Rust, type-checked at
# compile time, and a tiny hand-rolled JSON writer (`json.rs`) emits it — so there
# is no schemars/serde_json to vendor onto the compiler crate. The schema↔parser
# agreement is enforced by a cross-check test in kennel-lib-compile (dev-dep), the
# drift guard that makes "generate the schema from a table" trustworthy.
[dependencies]

[lints]
workspace = true

# A library half so kennel-lib-compile can dev-depend on the schema model for its
# schema↔parser cross-check test (dev-only; never linked into any shipped binary).
[lib]
name = "gen_schema"
path = "src/lib.rs"

[[bin]]
name = "gen-schema"
path = "src/main.rs"
