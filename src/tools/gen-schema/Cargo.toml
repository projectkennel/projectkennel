[package]
name = "gen-schema"
version.workspace = true
publish.workspace = true
description = "Project Kennel policy-schema generator (not shipped). Emits the JSON Schema (draft-07) for the authored policy TOML directly from the `kennel-lib-compile` source structs via `#[derive(SchemaType)]` — a pure export of the parser, with no hand-kept mirror to drift. Editors read the emitted `schema/policy.toml.schema` for completion + validation."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

# Tooling only (not shipped, in no TCB closure). It reflects the parser structs through
# their `schema` feature and renders the result with the already-vendored `serde_json` —
# so the schema is *derived* from the one source (the structs), not transcribed by hand.
[dependencies]
kennel-lib-compile = { path = "../../crates/kennel-lib-compile", features = ["schema"] }
kennel-schema = { path = "../../crates/kennel-schema" }
serde_json = { version = "=1.0.150", default-features = false, features = ["std"] }

[lints]
workspace = true

# A library half so kennel-lib-compile can dev-depend on it for the schema↔parser
# cross-check test (dev-only; never linked into any shipped binary).
[lib]
name = "gen_schema"
path = "src/lib.rs"

[[bin]]
name = "gen-schema"
path = "src/main.rs"
